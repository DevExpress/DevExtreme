<dx-data-grid
  id="gridContainer"
  [dataSource]="dataSource"
  [showBorders]="true"
  [columnAutoWidth]="true"
  [remoteOperations]="true"
  (onRowInserted)="onRowInserted($event)"
>
  <dxo-data-grid-scrolling [mode]="scrollingMode"></dxo-data-grid-scrolling>
  <dxo-data-grid-editing
    mode="row"
    [allowAdding]="true"
    [allowDeleting]="true"
    [allowUpdating]="true"
    [confirmDelete]="false"
    [useIcons]="true"
    [newRowPosition]="newRowPosition"
    [changes]="changes"
    [(editRowKey)]="editRowKey"
  ></dxo-data-grid-editing>
  <dxo-data-grid-pager [visible]="true"></dxo-data-grid-pager>

  <dxi-data-grid-column dataField="OrderID" [allowEditing]="false"></dxi-data-grid-column>
  <dxi-data-grid-column dataField="OrderDate" dataType="date">
    <dxi-data-grid-validation-rule type="required"></dxi-data-grid-validation-rule>
  </dxi-data-grid-column>
  <dxi-data-grid-column dataField="ShipName"></dxi-data-grid-column>
  <dxi-data-grid-column dataField="ShipCity"></dxi-data-grid-column>
  <dxi-data-grid-column dataField="ShipPostalCode"></dxi-data-grid-column>
  <dxi-data-grid-column dataField="ShipCountry"></dxi-data-grid-column>
  <dxi-data-grid-column type="buttons">
    <dxi-data-grid-button
      icon="add"
      text="Add"
      [onClick]="onAddButtonClick"
      [visible]="isAddButtonVisible"
    ></dxi-data-grid-button>
    <dxi-data-grid-button name="delete"></dxi-data-grid-button>
    <dxi-data-grid-button name="save"></dxi-data-grid-button>
    <dxi-data-grid-button name="cancel"></dxi-data-grid-button>
  </dxi-data-grid-column>

  <dxo-data-grid-toolbar>
    <dxi-data-grid-item name="addRowButton" showText="always"></dxi-data-grid-item>
  </dxo-data-grid-toolbar>
</dx-data-grid>

<div class="options">
  <div class="caption">Options</div>
  <div class="option-container">
    <div class="option">
      <span>New Row Position</span>
      <dx-select-box
        id="newRowPositionSelectBox"
        [(value)]="newRowPosition"
        [inputAttr]="{ 'aria-label': 'Position' }"
        [items]="newRowPositionOptions"
      ></dx-select-box>
    </div>
    <div class="option">
      <span>Scrolling Mode</span>
      <dx-select-box
        id="scrollingModeSelectBox"
        [inputAttr]="{ 'aria-label': 'Scrolling Mode' }"
        [(value)]="scrollingMode"
        [items]="scrollingModeOptions"
      ></dx-select-box>
    </div>
  </div>
</div>
