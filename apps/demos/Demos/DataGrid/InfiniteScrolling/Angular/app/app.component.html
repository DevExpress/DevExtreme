<dx-data-grid
  id="gridContainer"
  [dataSource]="dataSource"
  keyExpr="id"
  [customizeColumns]="customizeColumns"
  [showBorders]="true"
>
  <dxo-data-grid-load-panel [enabled]="false"></dxo-data-grid-load-panel>
  <dxo-data-grid-scrolling mode="infinite"></dxo-data-grid-scrolling>
  <dxo-data-grid-sorting mode="none"></dxo-data-grid-sorting>
</dx-data-grid>
