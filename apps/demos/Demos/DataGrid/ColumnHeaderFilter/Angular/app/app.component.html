<dx-data-grid
  id="employees"
  [dataSource]="employees"
  keyExpr="ID"
  [showRowLines]="true"
  [showBorders]="true"
  [columnAutoWidth]="true"
>
  <dxo-data-grid-header-filter [visible]="true"></dxo-data-grid-header-filter>

  <dxi-data-grid-column dataField="FirstName"></dxi-data-grid-column>
  <dxi-data-grid-column dataField="LastName"></dxi-data-grid-column>
  <dxi-data-grid-column dataField="Position">
    <dxo-data-grid-header-filter [allowSelectAll]="false">
      <dxo-data-grid-search [enabled]="true"></dxo-data-grid-search>
    </dxo-data-grid-header-filter>
  </dxi-data-grid-column>
  <dxi-data-grid-column dataField="City">
    <dxo-data-grid-header-filter>
      <dxo-data-grid-search
        [enabled]="true"
        [searchExpr]="searchExpr"
        [editorOptions]="editorOptions"
      ></dxo-data-grid-search>
    </dxo-data-grid-header-filter>
  </dxi-data-grid-column>
  <dxi-data-grid-column dataField="State"></dxi-data-grid-column>
  <dxi-data-grid-column dataField="HomePhone"></dxi-data-grid-column>
  <dxi-data-grid-column dataField="HireDate" dataType="date"></dxi-data-grid-column>
</dx-data-grid>
