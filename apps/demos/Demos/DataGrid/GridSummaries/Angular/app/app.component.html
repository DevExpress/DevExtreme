<dx-data-grid
  id="gridContainer"
  [dataSource]="orders"
  keyExpr="ID"
  [showBorders]="true"
>
  <dxo-data-grid-selection mode="single"></dxo-data-grid-selection>
  <dxo-data-grid-pager [visible]="true"></dxo-data-grid-pager>

  <dxi-data-grid-column
    dataField="OrderNumber"
    [width]="130"
    caption="Invoice Number"
  ></dxi-data-grid-column>
  <dxi-data-grid-column dataField="OrderDate" dataType="date"></dxi-data-grid-column>
  <dxi-data-grid-column dataField="Employee"></dxi-data-grid-column>
  <dxi-data-grid-column dataField="CustomerStoreCity" caption="City"></dxi-data-grid-column>
  <dxi-data-grid-column dataField="CustomerStoreState" caption="State"></dxi-data-grid-column>
  <dxi-data-grid-column
    dataField="SaleAmount"
    alignment="right"
    format="currency"
    [width]="160"
  ></dxi-data-grid-column>

  <dxo-data-grid-summary>
    <dxi-data-grid-total-item column="OrderNumber" summaryType="count"> </dxi-data-grid-total-item>
    <dxi-data-grid-total-item
      column="OrderDate"
      summaryType="min"
      [customizeText]="customizeDate"
    >
    </dxi-data-grid-total-item>
    <dxi-data-grid-total-item
      column="SaleAmount"
      summaryType="sum"
      valueFormat="currency"
    >
    </dxi-data-grid-total-item>
  </dxo-data-grid-summary>
</dx-data-grid>
