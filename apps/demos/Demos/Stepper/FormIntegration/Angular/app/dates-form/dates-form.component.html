<p>
  Select your check-in and check-out dates. If your dates are flexible, include
  that information in Additional Requests. We will do our best to suggest best
  pricing options, depending on room availability.
</p>
<dx-form
  #formComponent
  [(formData)]="formData"
  [validationGroup]="validationGroup"
>
  <dxi-form-item
    [isRequired]="true"
    dataField="dates"
    editorType="dxDateRangeBox"
    [editorOptions]="dateRangeBoxOptions"
    [label]="labelOptions"
  ></dxi-form-item>
</dx-form>
