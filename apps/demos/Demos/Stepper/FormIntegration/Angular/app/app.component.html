<dx-stepper
  [(selectedIndex)]="selectedIndex"
  (onSelectionChanging)="onSelectionChanging($event)"
>
  <dxi-stepper-item
    *ngFor="let step of steps"
    [label]="step.label"
    [icon]="step.icon"
    [isValid]="step.isValid"
    [hint]="step.hint"
    [optional]="step.optional"
  ></dxi-stepper-item>
</dx-stepper>
<div class="content">
  <dx-multi-view
    [(selectedIndex)]="selectedIndex"
    [animationEnabled]="false"
    [focusStateEnabled]="false"
    [swipeEnabled]="false"
    [height]="400"
  >
    <dxi-multi-view-item>
      <div *dxTemplate>
        <dates
          [formData]="formData"
          [validationGroup]="validationGroups[0]"
        ></dates>
      </div>
    </dxi-multi-view-item>
    <dxi-multi-view-item>
      <div *dxTemplate>
        <guests
          [formData]="formData"
          [validationGroup]="validationGroups[1]"
        ></guests>
      </div>
    </dxi-multi-view-item>
    <dxi-multi-view-item>
      <div *dxTemplate>
        <room-meal
          [formData]="formData"
          [validationGroup]="validationGroups[2]"
        ></room-meal>
      </div>
    </dxi-multi-view-item>
    <dxi-multi-view-item>
      <div *dxTemplate>
        <additional-request [formData]="formData"></additional-request>
      </div>
    </dxi-multi-view-item>
    <dxi-multi-view-item>
      <div *dxTemplate>
        <confirmation
          [formData]="formData"
          [isConfirmed]="isConfirmed"
        ></confirmation>
      </div>
    </dxi-multi-view-item>
  </dx-multi-view>
  <div class="nav-panel">
    <div class="current-step">
      <span *ngIf="!isConfirmed">
        Step <span class="selected-index">{{ selectedIndex + 1 }}</span> of
        <span class="step-count">{{ steps.length }}</span>
      </span>
    </div>
    <div class="nav-buttons">
      <dx-button
        id="prevButton"
        [visible]="selectedIndex !== 0 && !isConfirmed"
        text="Back"
        type="normal"
        (onClick)="onPrevButtonClick($event)"
        [width]="100"
      >
      </dx-button>
      <dx-button
        id="nextButton"
        [text]="getNextButtonText()"
        type="default"
        (onClick)="onNextButtonClick($event)"
        [width]="100"
      >
      </dx-button>
    </div>
  </div>
</div>
