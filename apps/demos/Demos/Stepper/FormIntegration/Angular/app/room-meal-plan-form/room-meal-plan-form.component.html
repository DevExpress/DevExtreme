<p>
  Review room types that can accommodate your group size and make your
  selection. You can also choose a meal plan, whether it's breakfast only or
  full board.
</p>
<dx-form
  #formComponent
  [(formData)]="formData"
  [validationGroup]="validationGroup"
  [colCount]="2"
>
  <dxi-form-item
    [isRequired]="true"
    dataField="roomType"
    editorType="dxSelectBox"
    [editorOptions]="roomSelectBoxOptions"
    [label]="roomLabelOptions"
  ></dxi-form-item>

  <dxi-form-item
    [isRequired]="true"
    dataField="mealPlan"
    editorType="dxSelectBox"
    [editorOptions]="mealSelectBoxOptions"
    [label]="mealLabelOptions"
  ></dxi-form-item>
</dx-form>
