<dx-chart
  id="chart"
  title="World Population by Decade"
  [dataSource]="populationData"
>
  <dxo-chart-legend [visible]="false"></dxo-chart-legend>
  <dxi-chart-series type="bar"></dxi-chart-series>
  <dxo-chart-argument-axis [tickInterval]="10">
    <dxo-chart-label>
      <dxo-chart-format type="decimal"></dxo-chart-format>
    </dxo-chart-label>
  </dxo-chart-argument-axis>
</dx-chart>
