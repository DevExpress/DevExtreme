<dx-chart
  id="chart"
  title="Gross State Product within the Great Lakes Region (Billions USD)"
  [dataSource]="grossProductData"
  (onPointClick)="onPointClick($event)"
>
  <dxi-chart-series valueField="year2024" name="2024"></dxi-chart-series>
  <dxi-chart-series valueField="year2023" name="2023"></dxi-chart-series>
  <dxi-chart-series valueField="year2022" name="2022"></dxi-chart-series>
  <dxo-chart-common-series-settings
    argumentField="state"
    type="bar"
    hoverMode="allArgumentPoints"
    selectionMode="allArgumentPoints"
  >
    <dxo-chart-label
      [visible]="true"
      [format]="{
        type: 'fixedPoint',
        precision: '0'
      }"
    >
    </dxo-chart-label>
  </dxo-chart-common-series-settings>
  <dxo-chart-legend verticalAlignment="bottom" horizontalAlignment="center">
  </dxo-chart-legend>
  <dxo-chart-export [enabled]="true"></dxo-chart-export>
</dx-chart>
