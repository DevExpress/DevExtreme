<dx-chart id="chart" title="Male Age Structure" [dataSource]="dataSource">
  <dxi-chart-series valueField="young" name="0-14"></dxi-chart-series>
  <dxi-chart-series valueField="middle" name="15-64"></dxi-chart-series>
  <dxi-chart-series valueField="older" name="65 and older"></dxi-chart-series>
  <dxi-chart-value-axis position="right">
    <dxo-chart-title text="millions"></dxo-chart-title>
  </dxi-chart-value-axis>
  <dxo-chart-common-series-settings argumentField="state" type="stackedBar">
  </dxo-chart-common-series-settings>
  <dxo-chart-legend
    verticalAlignment="bottom"
    horizontalAlignment="center"
    itemTextPosition="top"
  >
  </dxo-chart-legend>
  <dxo-chart-export [enabled]="true"></dxo-chart-export>
  <dxo-chart-tooltip
    [enabled]="true"
    location="edge"
    [customizeTooltip]="customizeTooltip"
  >
  </dxo-chart-tooltip>
</dx-chart>
