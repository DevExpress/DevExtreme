<dx-chart
  id="chart"
  [dataSource]="dataSource"
  title="Pizza Shop Complaints"
  palette="Harmony Light"
>
  <dxi-chart-value-axis name="frequency" position="left" [tickInterval]="300">
  </dxi-chart-value-axis>
  <dxi-chart-value-axis
    name="percentage"
    position="right"
    [showZero]="true"
    [tickInterval]="20"
    [valueMarginsEnabled]="false"
  >
    <dxo-chart-label [customizeText]="customizeLabelText"></dxo-chart-label>
    <dxi-chart-constant-line
      [value]="80"
      color="#fc3535"
      dashStyle="dash"
      [width]="2"
    >
      <dxo-chart-label [visible]="false"></dxo-chart-label>
    </dxi-chart-constant-line>
  </dxi-chart-value-axis>
  <dxo-chart-argument-axis>
    <dxo-chart-label overlappingBehavior="stagger"></dxo-chart-label>
  </dxo-chart-argument-axis>
  <dxo-chart-tooltip
    [enabled]="true"
    [shared]="true"
    [customizeTooltip]="customizeTooltip"
  >
  </dxo-chart-tooltip>
  <dxo-chart-common-series-settings argumentField="complaint">
  </dxo-chart-common-series-settings>
  <dxi-chart-series
    type="bar"
    valueField="count"
    axis="frequency"
    name="Complaint frequency"
    color="#fac29a"
  >
  </dxi-chart-series>
  <dxi-chart-series
    type="spline"
    valueField="cumulativePercent"
    axis="percentage"
    name="Cumulative percentage"
    color="#6b71c3"
  >
  </dxi-chart-series>
  <dxo-chart-legend verticalAlignment="top" horizontalAlignment="center">
  </dxo-chart-legend>
</dx-chart>
