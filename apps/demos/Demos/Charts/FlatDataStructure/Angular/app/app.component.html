<dx-tree-map
  id="treemap"
  [dataSource]="citiesPopulations"
  title="The Most Populated Cities by Continents"
  idField="id"
  parentField="parentId"
>
  <dxo-tree-map-tooltip
    [enabled]="true"
    format="thousands"
    [customizeTooltip]="customizeTooltip"
  ></dxo-tree-map-tooltip>
</dx-tree-map>
