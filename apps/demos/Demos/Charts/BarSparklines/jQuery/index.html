<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">
  <head>
    <title>DevExtreme Demo</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <script src="../../../../node_modules/jquery/dist/jquery.min.js"></script>
    <link rel="stylesheet" type="text/css" href="../../../../node_modules/devextreme-dist/css/dx.light.css" />
    <script src="../../../../node_modules/devextreme-dist/js/dx.all.js"></script>
    <link rel="stylesheet" type="text/css" href="styles.css" />
    <script src="index.js"></script>
  </head>
  <body class="dx-viewport">
    <div class="demo-container">
      <div class="long-title"><h3>Monthly Prices of Copper, Nickel and Palladium</h3></div>
      <div id="chart-demo">
        <table class="demo-table" border="1">
          <tr>
            <th><div class="dx-screen-reader-only">Year</div></th>
            <th>Copper (USD/ton)</th>
            <th>Nickel (USD/ton)</th>
            <th>Palladium (USD/troy ounce)</th>
          </tr>
          <tr>
            <th>2021</th>
            <td><div class="sparkline cop2021"></div></td>
            <td><div class="sparkline nick2021"></div></td>
            <td><div class="sparkline pal2021"></div></td>
          </tr>
          <tr>
            <th>2022</th>
            <td><div class="sparkline cop2022"></div></td>
            <td><div class="sparkline nick2022"></div></td>
            <td><div class="sparkline pal2022"></div></td>
          </tr>
          <tr>
            <th>2023</th>
            <td><div class="sparkline cop2023"></div></td>
            <td><div class="sparkline nick2023"></div></td>
            <td><div class="sparkline pal2023"></div></td>
          </tr>
        </table>
        <div class="action">
          <div class="label">Choose a number of months:</div>
          <div id="choose-months"></div>
        </div>
      </div>
    </div>
  </body>
</html>
