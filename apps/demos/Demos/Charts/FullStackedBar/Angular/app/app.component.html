<dx-chart id="chart" [dataSource]="countriesInfo">
  <dxi-chart-series valueField="hydro" name="Hydro-electric"></dxi-chart-series>
  <dxi-chart-series valueField="oil" name="Oil"></dxi-chart-series>
  <dxi-chart-series valueField="gas" name="Natural gas"></dxi-chart-series>
  <dxi-chart-series valueField="coal" name="Coal"></dxi-chart-series>
  <dxi-chart-series valueField="nuclear" name="Nuclear"></dxi-chart-series>
  <dxo-chart-common-series-settings
    argumentField="country"
    type="fullStackedBar"
  >
  </dxo-chart-common-series-settings>
  <dxo-chart-legend
    verticalAlignment="top"
    horizontalAlignment="center"
    itemTextPosition="right"
  >
  </dxo-chart-legend>
  <dxo-chart-title text="Energy Consumption in 2024">
    <dxo-chart-subtitle
      text="(Millions of Tons, Oil Equivalent)"
    ></dxo-chart-subtitle>
  </dxo-chart-title>
  <dxo-chart-export [enabled]="true"></dxo-chart-export>
  <dxo-chart-tooltip [enabled]="true" [customizeTooltip]="customizeTooltip">
  </dxo-chart-tooltip>
</dx-chart>
