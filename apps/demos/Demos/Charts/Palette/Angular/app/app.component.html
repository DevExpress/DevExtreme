<div class="flex-container">
  <dx-pie-chart
    id="pie"
    [palette]="palette"
    [dataSource]="data"
    [paletteExtensionMode]="paletteExtensionMode"
  >
    <dxo-pie-chart-size [width]="500"></dxo-pie-chart-size>
    <dxo-pie-chart-legend [visible]="false"></dxo-pie-chart-legend>
    <dxi-pie-chart-series></dxi-pie-chart-series>
  </dx-pie-chart>

  <div class="palette-container flex-block">
    <div
      class="palette-item"
      *ngFor="let color of baseColors"
      [style.background-color]="color"
    ></div>
  </div>
</div>

<div class="options">
  <div class="caption">Options</div>
  <div class="options-container">
    <div class="option">
      <span>Palette</span>
      <dx-select-box
        [items]="paletteCollection"
        [(value)]="palette"
        [inputAttr]="{ 'aria-label': 'Palette' }"
      >
      </dx-select-box>
    </div>
    <div class="option">
      <span>Palette Extension Mode</span>
      <dx-select-box
        [items]="paletteExtensionModes"
        [(value)]="paletteExtensionMode"
        [inputAttr]="{ 'aria-label': 'Palette Extension Mode' }"
      >
      </dx-select-box>
    </div>
  </div>
</div>
