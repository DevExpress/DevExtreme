<dx-pie-chart
  id="pie"
  title="Top internet languages"
  palette="bright"
  [dataSource]="internetLanguages"
>
  <dxo-pie-chart-legend
    horizontalAlignment="center"
    verticalAlignment="bottom"
  ></dxo-pie-chart-legend>
  <dxo-pie-chart-export [enabled]="true"></dxo-pie-chart-export>
  <dxi-pie-chart-series argumentField="language" valueField="percent">
    <dxo-pie-chart-label
      [visible]="true"
      format="fixedPoint"
      [customizeText]="customizeLabel"
    >
      <dxo-pie-chart-connector [visible]="true" [width]="0.5"></dxo-pie-chart-connector>
    </dxo-pie-chart-label>
    <dxo-pie-chart-small-values-grouping
      mode="smallValueThreshold"
      [threshold]="4.5"
    ></dxo-pie-chart-small-values-grouping>
  </dxi-pie-chart-series>
</dx-pie-chart>
