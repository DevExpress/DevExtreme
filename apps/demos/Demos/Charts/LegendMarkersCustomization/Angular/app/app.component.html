<dx-chart
  id="chart"
  [dataSource]="dataSource"
  (onLegendClick)="onLegendClick($event)"
>
  <dxo-chart-title text="Noisy and Original Signals"> </dxo-chart-title>
  <dxo-chart-common-series-settings argumentField="argument">
    <dxo-chart-point [visible]="false"></dxo-chart-point>
  </dxo-chart-common-series-settings>
  <dxi-chart-series valueField="originalValue" name="Original Signal"> </dxi-chart-series>
  <dxi-chart-series valueField="value" name="Noisy Signal"> </dxi-chart-series>
  <dxo-chart-legend
    verticalAlignment="bottom"
    horizontalAlignment="center"
    markerTemplate="markerTemplate"
  >
    <svg
      *dxTemplate="let item of 'markerTemplate'"
      attr.fill="{{ getMarkerColor(item) }}"
    >
      <rect
        x="0"
        y="0"
        width="18"
        height="18"
        opacity="0.3"
        attr.fill="getMarkerColor(item)"
      ></rect>
      <path attr.d="{{ getMarkerPath(item.series.name) }}"></path>
    </svg>
  </dxo-chart-legend>
</dx-chart>
