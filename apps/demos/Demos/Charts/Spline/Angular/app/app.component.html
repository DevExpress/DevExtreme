<div id="chart-demo">
  <dx-chart
    palette="violet"
    [dataSource]="architecturesInfo"
    title="Architecture Share Over Time (Count)"
  >
    <dxi-chart-series valueField="smp" name="SMP"></dxi-chart-series>
    <dxi-chart-series valueField="mmp" name="MMP"></dxi-chart-series>
    <dxi-chart-series valueField="cnstl" name="Cnstl"></dxi-chart-series>
    <dxi-chart-series valueField="cluster" name="Cluster"></dxi-chart-series>
    <dxo-chart-common-series-settings
      #seriesSettings
      argumentField="year"
      [type]="types[0]"
    >
    </dxo-chart-common-series-settings>
    <dxo-chart-margin [bottom]="20"></dxo-chart-margin>
    <dxo-chart-common-axis-settings>
      <dxo-chart-grid [visible]="true"></dxo-chart-grid>
    </dxo-chart-common-axis-settings>
    <dxo-chart-legend verticalAlignment="top" horizontalAlignment="right">
    </dxo-chart-legend>
    <dxo-chart-argument-axis [allowDecimals]="false" [axisDivisionFactor]="60">
      <dxo-chart-label>
        <dxo-chart-format type="decimal"></dxo-chart-format>
      </dxo-chart-label>
    </dxo-chart-argument-axis>
    <dxo-chart-export [enabled]="true"></dxo-chart-export>
    <dxo-chart-tooltip [enabled]="true"></dxo-chart-tooltip>
  </dx-chart>
  <div class="options">
    <div class="caption">Options</div>
    <div class="option">
      <span>Series Type</span>
      <dx-select-box
        [dataSource]="types"
        [(value)]="seriesSettings.type"
        [inputAttr]="{ 'aria-label': 'Series Type' }"
      >
      </dx-select-box>
    </div>
  </div>
</div>
