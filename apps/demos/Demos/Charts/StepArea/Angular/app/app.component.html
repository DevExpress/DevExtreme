<dx-chart id="chart" title="Australian Medal Count" [dataSource]="medalsInfo">
  <dxi-chart-series
    valueField="bronze"
    name="Bronze Medals"
    color="#cd7f32"
  ></dxi-chart-series>
  <dxi-chart-series
    valueField="silver"
    name="Silver Medals"
    color="#c0c0c0"
  ></dxi-chart-series>
  <dxi-chart-series valueField="gold" name="Gold Medals" color="#ffd700"></dxi-chart-series>
  <dxo-chart-common-series-settings argumentField="year" type="steparea">
    <dxo-steparea>
      <dxo-chart-border [visible]="false"></dxo-chart-border>
    </dxo-steparea>
  </dxo-chart-common-series-settings>
  <dxo-chart-argument-axis [valueMarginsEnabled]="false">
    <dxo-chart-label>
      <dxo-chart-format type="decimal"></dxo-chart-format>
    </dxo-chart-label>
  </dxo-chart-argument-axis>
  <dxo-chart-export [enabled]="true"></dxo-chart-export>
  <dxo-chart-legend verticalAlignment="bottom" horizontalAlignment="center">
  </dxo-chart-legend>
</dx-chart>
