<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">
  <head>
    <title>DevExtreme Demo</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <script src="../../../../node_modules/jquery/dist/jquery.min.js"></script>
    <link rel="stylesheet" type="text/css" href="../../../../node_modules/devextreme-dist/css/dx.light.css" />
    <script src="../../../../node_modules/devextreme-dist/js/dx.all.js"></script>
    <script src="data.js"></script>
    <link rel="stylesheet" type="text/css" href="styles.css" />
    <script src="index.js"></script>
  </head>
  <body class="dx-viewport">
    <div class="demo-container">
      <div class="long-title"><h3>Monthly Prices of Oil, Gold and Silver</h3></div>
      <div id="chart-demo">
        <table class="demo-table">
          <tr>
            <th><div class="dx-screen-reader-only">Year</div></th>
            <th>Oil (USD/barrel)</th>
            <th>Gold (USD/troy ounce)</th>
            <th>Silver (USD/troy ounce)</th>
          </tr>
          <tr>
            <th>2021</th>
            <td><div class="sparkline line2021"></div></td>
            <td><div class="sparkline spline2021"></div></td>
            <td><div class="sparkline stepline2021"></div></td>
          </tr>
          <tr>
            <th>2022</th>
            <td><div class="sparkline line2022"></div></td>
            <td><div class="sparkline spline2022"></div></td>
            <td><div class="sparkline stepline2022"></div></td>
          </tr>
          <tr>
            <th>2023</th>
            <td><div class="sparkline line2023"></div></td>
            <td><div class="sparkline spline2023"></div></td>
            <td><div class="sparkline stepline2023"></div></td>
          </tr>
        </table>
      </div>
    </div>
  </body>
</html>
