<dx-polar-chart
  id="chart"
  title="Rose in Polar Coordinates"
  [dataSource]="coordinates"
>
  <dxi-polar-chart-series type="line"></dxi-polar-chart-series>
  <dxo-polar-chart-argument-axis [inverted]="true" [startAngle]="90" [tickInterval]="30">
  </dxo-polar-chart-argument-axis>
  <dxo-polar-chart-export [enabled]="true"></dxo-polar-chart-export>
  <dxo-polar-chart-legend [visible]="false"></dxo-polar-chart-legend>
</dx-polar-chart>
