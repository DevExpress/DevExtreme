<div class="long-title"><h3>Daily temperature</h3></div>
<div id="chart-demo">
  <table class="demo-table">
    <tr>
      <th><div class="dx-screen-reader-only">Week</div></th>
      <th>June</th>
      <th>July</th>
      <th>August</th>
    </tr>
    @for(week of weeksData; track week) {
    <tr>
      <th>{{ week.weekCount }} week</th>
      @for(bullet of week.bulletsData; track bullet) {
      <td>
        <dx-bullet
          class="bullet"
          [startScaleValue]="0"
          [endScaleValue]="35"
          [value]="bullet.value"
          [target]="bullet.target"
          [color]="bullet.color"
        >
          <dxo-bullet-tooltip
            [customizeTooltip]="customizeTooltip"
          ></dxo-bullet-tooltip>
        </dx-bullet>
      </td>
      }
    </tr>
    }
  </table>
</div>
