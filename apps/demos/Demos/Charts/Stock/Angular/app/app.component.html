<dx-chart id="chart" title="Stock Price" [dataSource]="stockPrices">
  <dxi-chart-series
    name="E-Mart"
    openValueField="o"
    highValueField="h"
    lowValueField="l"
    closeValueField="c"
  >
    <dxo-chart-reduction color="red"></dxo-chart-reduction>
  </dxi-chart-series>
  <dxo-chart-common-series-settings argumentField="date" type="stock">
  </dxo-chart-common-series-settings>
  <dxi-chart-value-axis [tickInterval]="1">
    <dxo-chart-title text="US dollars"></dxo-chart-title>
    <dxo-chart-label>
      <dxo-chart-format type="currency" [precision]="0"> </dxo-chart-format>
    </dxo-chart-label>
  </dxi-chart-value-axis>
  <dxo-chart-argument-axis [workdaysOnly]="true">
    <dxo-chart-label format="shortDate"></dxo-chart-label>
  </dxo-chart-argument-axis>
  <dxo-chart-export [enabled]="true"></dxo-chart-export>
  <dxo-chart-tooltip
    [enabled]="true"
    location="edge"
    [customizeTooltip]="customizeTooltip"
  >
  </dxo-chart-tooltip>
</dx-chart>
