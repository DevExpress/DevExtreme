<dx-chart id="chart" [dataSource]="dataSource">
  <dxo-chart-title text="Production of Crude Oil">
    <dxo-chart-subtitle text="(in Barrels)"></dxo-chart-subtitle>
  </dxo-chart-title>
  <dxo-chart-common-series-settings
    argumentField="state"
    valueField="value"
    type="bar"
  >
    <dxo-chart-aggregation enabled="true" method="sum"></dxo-chart-aggregation>
  </dxo-chart-common-series-settings>
  <dxo-chart-series-template nameField="year"></dxo-chart-series-template>
</dx-chart>
