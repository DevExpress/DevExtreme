<div id="pivotgrid-demo">
  <dx-chart id="sales-chart">
    <dxo-chart-common-series-settings type="bar"></dxo-chart-common-series-settings>
    <dxo-chart-size [height]="200"></dxo-chart-size>
    <dxo-chart-adaptive-layout [width]="450"></dxo-chart-adaptive-layout>
    <dxo-chart-tooltip
      [enabled]="true"
      format="currency"
      [customizeTooltip]="customizeTooltip"
    ></dxo-chart-tooltip>
  </dx-chart>

  <dx-pivot-grid
    id="pivotgrid"
    [allowSortingBySummary]="true"
    [allowFiltering]="true"
    [showBorders]="true"
    [allowSortingBySummary]="true"
    [showColumnGrandTotals]="false"
    [showRowGrandTotals]="false"
    [showRowTotals]="false"
    [showColumnTotals]="false"
    [dataSource]="pivotGridDataSource"
  >
    <dxo-pivot-grid-field-chooser [enabled]="true" [height]="400"></dxo-pivot-grid-field-chooser>
    <dxo-pivot-grid-scrolling mode="virtual"></dxo-pivot-grid-scrolling>
  </dx-pivot-grid>
</div>
