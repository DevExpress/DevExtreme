<dx-gantt taskListWidth="500" scaleType="weeks" height="700">
  <dxo-gantt-tasks [dataSource]="tasks"></dxo-gantt-tasks>
  <dxo-gantt-dependencies [dataSource]="dependencies"></dxo-gantt-dependencies>
  <dxo-gantt-resources [dataSource]="resources"></dxo-gantt-resources>
  <dxo-gantt-resource-assignments
    [dataSource]="resourceAssignments"
  ></dxo-gantt-resource-assignments>

  <dxi-gantt-column dataField="title" caption="Subject" [width]="300"></dxi-gantt-column>
  <dxi-gantt-column
    dataField="start"
    caption="Start Date"
    dataType="date"
  ></dxi-gantt-column>
  <dxi-gantt-column dataField="end" caption="End Date" dataType="date"></dxi-gantt-column>

  <dxo-gantt-toolbar>
    <dxi-gantt-item name="undo"></dxi-gantt-item>
    <dxi-gantt-item name="redo"></dxi-gantt-item>
    <dxi-gantt-item name="separator"></dxi-gantt-item>
    <dxi-gantt-item name="collapseAll"></dxi-gantt-item>
    <dxi-gantt-item name="expandAll"></dxi-gantt-item>
    <dxi-gantt-item name="separator"></dxi-gantt-item>
    <dxi-gantt-item name="addTask"></dxi-gantt-item>
    <dxi-gantt-item name="deleteTask"></dxi-gantt-item>
    <dxi-gantt-item name="separator"></dxi-gantt-item>
    <dxi-gantt-item name="zoomIn"></dxi-gantt-item>
    <dxi-gantt-item name="zoomOut"></dxi-gantt-item>
  </dxo-gantt-toolbar>

  <dxo-gantt-validation [autoUpdateParentTasks]="true"></dxo-gantt-validation>
  <dxo-gantt-editing [enabled]="true"></dxo-gantt-editing>
</dx-gantt>
