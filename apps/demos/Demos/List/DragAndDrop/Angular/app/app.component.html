<div id="list-demo">
  <div class="widget-container">
    <dx-list
      [dataSource]="plannedTasks"
      keyExpr="id"
      [repaintChangesOnly]="true"
    >
      <dxo-list-item-dragging
        group="tasks"
        [data]="plannedTasks"
        [allowReordering]="true"
        [onDragStart]="onDragStart"
        [onAdd]="onAdd"
        [onRemove]="onRemove"
        [onReorder]="onReorder"
      >
      </dxo-list-item-dragging>
    </dx-list>
    <dx-list [dataSource]="doingTasks" keyExpr="id" [repaintChangesOnly]="true">
      <dxo-list-item-dragging
        group="tasks"
        [data]="doingTasks"
        [allowReordering]="true"
        [onDragStart]="onDragStart"
        [onAdd]="onAdd"
        [onRemove]="onRemove"
        [onReorder]="onReorder"
      >
      </dxo-list-item-dragging>
    </dx-list>
  </div>
</div>
