<p>
  <b>Image licensed under: </b>
  <span>{{ vehicle.LicenseName }}</span>
</p>
<p>
  <b>Author: </b>
  <span>{{ vehicle.Author }}</span>
</p>
<p>
  <b>Source link: </b>
  <a [href]="vehicleLink" target="_blank">{{ vehicleLink }}</a>
</p>
<p>
  <b>Edits: </b>
  <span>{{ vehicle.Edits }}</span>
</p>
