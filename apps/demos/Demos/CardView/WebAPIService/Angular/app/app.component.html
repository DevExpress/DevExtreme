<dx-card-view
  [dataSource]="dataSource"
  [remoteOperations]="true"
  [headerFilter]="headerFilterConfig"
  [searchPanel]="searchPanelConfig"
  [cardMinWidth]="100"
  [wordWrapEnabled]="true"
>
  <dxo-card-view-search-panel [visible]="true"></dxo-card-view-search-panel>
  <dxo-card-view-header-filter [visible]="true"></dxo-card-view-header-filter>
  <dxo-card-view-editing
    [allowAdding]="true"
    [allowUpdating]="true"
    [allowDeleting]="true"
    [popup]="{ width: 700, height: 400 }"
  ></dxo-card-view-editing>
  <dxi-card-view-column dataField="Task_Subject" caption="Subject">
    <dxi-card-view-required-rule></dxi-card-view-required-rule>
  </dxi-card-view-column>
  <dxi-card-view-column
    dataField="Task_Start_Date"
    caption="Start Date"
    dataType="date"
  ></dxi-card-view-column>
  <dxi-card-view-column
    dataField="Task_Due_Date"
    caption="Due Date"
    dataType="date"
  ></dxi-card-view-column>
  <dxi-card-view-column
    dataField="Task_Priority"
    caption="Priority"
  ></dxi-card-view-column>
  <dxi-card-view-column
    dataField="Task_Status"
    caption="Status"
  ></dxi-card-view-column>
</dx-card-view>
