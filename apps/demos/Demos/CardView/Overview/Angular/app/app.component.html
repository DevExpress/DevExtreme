<div class="demo-container">
  <dx-card-view
    [dataSource]="employees"
    keyExpr="ID"
    [cardMinWidth]="250"
    cardsPerRow="auto"
    [headerFilter]="headerFilterConfig"
    [searchPanel]="searchPanelConfig"
    cardFooterTemplate="footerTemplate"
  >
    <dxo-card-view-selection mode="multiple"></dxo-card-view-selection>

    <dxo-card-view-card-cover
      [imageExpr]="imageExpr"
      [altExpr]="altExpr"
    ></dxo-card-view-card-cover>

    <dxi-card-view-column
      dataField="Status"
      fieldValueTemplate="statusTemplate"
    ></dxi-card-view-column>
    <dxi-card-view-column
      caption="Full Name"
      [calculateFieldValue]="calculateFullName"
    ></dxi-card-view-column>
    <dxi-card-view-column
      caption="Position"
      dataField="Title"
    ></dxi-card-view-column>
    <dxi-card-view-column dataField="Department"></dxi-card-view-column>
    <dxi-card-view-column
      dataField="Head_ID"
      caption="Assigned To"
      [calculateDisplayValue]="calculateAssignedTo"
      fieldValueTemplate="assignedToTemplate"
    ></dxi-card-view-column>
    <dxi-card-view-column dataField="Mobile_Phone"></dxi-card-view-column>
    <dxi-card-view-column dataField="Email"></dxi-card-view-column>
    <dxi-card-view-column
      caption="Address"
      [calculateFieldValue]="calculateAddress"
    ></dxi-card-view-column>

    <div
      *dxTemplate="let params of 'statusTemplate'"
      [class.status-ok]="params.field.value === 'Salaried'"
      [class.status-warning]="params.field.value !== 'Salaried'"
    >
      <span class="indicator"></span>
      <span>{{ params.field.value }}</span>
    </div>
    <div *dxTemplate="let params of 'assignedToTemplate'">
      <div *ngIf="!params.field.value">{{ params.field.text }}</div>
      <div *ngIf="params.field.value">
        <a class="dx-link" (click)="navigateToAssignee(params.field.value)">
          {{ params.field.text }}
        </a>
      </div>
    </div>
    <div *dxTemplate="let params of 'footerTemplate'" class="footer">
      <dx-button
        text="Call"
        icon="tel"
        type="default"
        stylingMode="contained"
        (onClick)="showNotify('Call')"
      ></dx-button>
      <dx-button
        text="Send Email"
        icon="send"
        type="default"
        stylingMode="contained"
        (onClick)="showNotify('Send Email')"
      ></dx-button>
    </div>
  </dx-card-view>
</div>
