<dx-diagram #diagram id="diagram" [simpleView]="true">
  <dxo-diagram-nodes
    [dataSource]="dataSource"
    keyExpr="ID"
    textExpr="Title"
    parentKeyExpr="Head_ID"
  >
    <dxo-diagram-auto-layout type="tree"></dxo-diagram-auto-layout>
  </dxo-diagram-nodes>
  <dxo-diagram-toolbox visibility="disabled"></dxo-diagram-toolbox>
  <dxo-diagram-properties-panel visibility="disabled"></dxo-diagram-properties-panel>
</dx-diagram>
