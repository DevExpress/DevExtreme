<dx-diagram #diagram id="diagram">
  <dxo-diagram-nodes
    [dataSource]="dataSource"
    keyExpr="ID"
    textExpr="Title"
    parentKeyExpr="HeadID"
  >
    <dxo-diagram-auto-layout type="tree"></dxo-diagram-auto-layout>
  </dxo-diagram-nodes>
  <dxo-diagram-context-toolbox
    [width]="100"
    [shapeIconsPerRow]="2"
    [shapes]="['rectangle']"
  >
  </dxo-diagram-context-toolbox>
  <dxo-diagram-toolbox [shapeIconsPerRow]="2" [showSearch]="false">
    <dxi-diagram-group title="Items" [shapes]="['rectangle']"></dxi-diagram-group>
  </dxo-diagram-toolbox>
</dx-diagram>
