<dx-diagram #diagram id="diagram">
  @for(emp of employees; track emp.ID) {
  <dxi-diagram-custom-shape
    category="employees"
    [type]="'employee' + emp.ID"
    baseType="rectangle"
    [defaultText]="emp.Full_Name"
    [allowEditText]="false"
  >
  </dxi-diagram-custom-shape>
  }
  <dxo-diagram-toolbox>
    <dxi-diagram-group
      category="employees"
      title="Employees"
      displayMode="texts"
    ></dxi-diagram-group>
  </dxo-diagram-toolbox>
</dx-diagram>
