<dx-diagram #diagram id="diagram">
  <dxo-diagram-nodes
    [dataSource]="dataSource"
    keyExpr="ID"
    textExpr="Title"
    parentKeyExpr="Head_ID"
  >
    <dxo-diagram-auto-layout type="tree"></dxo-diagram-auto-layout>
  </dxo-diagram-nodes>
  <dxo-diagram-toolbox>
    <dxi-diagram-group category="general" title="General"></dxi-diagram-group>
  </dxo-diagram-toolbox>
</dx-diagram>
