<dx-circular-gauge id="gauge" [value]="85" [subvalues]="[40, 90]">
  <dxo-circular-gauge-subvalue-indicator [offset]="-25"></dxo-circular-gauge-subvalue-indicator>
  <dxo-circular-gauge-value-indicator [offset]="50"></dxo-circular-gauge-value-indicator>
  <dxo-circular-gauge-scale [startValue]="0" [endValue]="100" [tickInterval]="10">
    <dxo-circular-gauge-tick color="#536878"></dxo-circular-gauge-tick>
    <dxo-circular-gauge-label [indentFromTick]="3"></dxo-circular-gauge-label>
  </dxo-circular-gauge-scale>
  <dxo-circular-gauge-range-container [offset]="10">
    <dxi-circular-gauge-range [startValue]="0" [endValue]="30" color="#92000A"></dxi-circular-gauge-range>
    <dxi-circular-gauge-range [startValue]="30" [endValue]="70" color="#E6E200"></dxi-circular-gauge-range>
    <dxi-circular-gauge-range [startValue]="70" [endValue]="100" color="#77DD77"></dxi-circular-gauge-range>
  </dxo-circular-gauge-range-container>
  <dxo-circular-gauge-export [enabled]="true"></dxo-circular-gauge-export>
  <dxo-circular-gauge-title text="Amount of Tickets Sold (with Min and Max Expected)">
    <dxo-circular-gauge-font [size]="28"></dxo-circular-gauge-font>
  </dxo-circular-gauge-title>
</dx-circular-gauge>
