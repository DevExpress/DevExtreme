<dx-linear-gauge id="gauge" [value]="35">
  <dxo-linear-gauge-geometry orientation="vertical"></dxo-linear-gauge-geometry>
  <dxo-linear-gauge-scale [startValue]="0" [endValue]="50" [customTicks]="[0, 10, 25, 50]">
  </dxo-linear-gauge-scale>
  <dxo-linear-gauge-export [enabled]="true"></dxo-linear-gauge-export>
  <dxo-linear-gauge-title text="Fuel Volume (in Liters)">
    <dxo-linear-gauge-font [size]="28"></dxo-linear-gauge-font>
  </dxo-linear-gauge-title>
</dx-linear-gauge>
