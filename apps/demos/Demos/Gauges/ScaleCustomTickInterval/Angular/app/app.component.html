<dx-linear-gauge id="gauge" [value]="4.3">
  <dxo-linear-gauge-scale
    [startValue]="0"
    [endValue]="5"
    [tickInterval]="2.5"
    [minorTickInterval]="0.625"
  >
    <dxo-linear-gauge-minor-tick [visible]="true"></dxo-linear-gauge-minor-tick>
  </dxo-linear-gauge-scale>
  <dxo-linear-gauge-export [enabled]="true"></dxo-linear-gauge-export>
  <dxo-linear-gauge-title text="TV Show Rating">
    <dxo-linear-gauge-font [size]="28"></dxo-linear-gauge-font>
  </dxo-linear-gauge-title>
</dx-linear-gauge>
