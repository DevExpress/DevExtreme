<dx-circular-gauge id="gauge" [value]="45">
  <dxo-circular-gauge-scale [startValue]="0" [endValue]="100" [tickInterval]="10">
    <dxo-circular-gauge-label [customizeText]="customizeText"></dxo-circular-gauge-label>
  </dxo-circular-gauge-scale>
  <dxo-circular-gauge-range-container>
    <dxi-circular-gauge-range [startValue]="0" [endValue]="20" color="#CE2029"></dxi-circular-gauge-range>
    <dxi-circular-gauge-range [startValue]="20" [endValue]="50" color="#FFD700"></dxi-circular-gauge-range>
    <dxi-circular-gauge-range [startValue]="50" [endValue]="100" color="#228B22"></dxi-circular-gauge-range>
  </dxo-circular-gauge-range-container>
  <dxo-circular-gauge-export [enabled]="true"></dxo-circular-gauge-export>
  <dxo-circular-gauge-title text="Battery Charge">
    <dxo-circular-gauge-font [size]="28"></dxo-circular-gauge-font>
  </dxo-circular-gauge-title>
</dx-circular-gauge>
