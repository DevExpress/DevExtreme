<dx-bar-gauge
  id="gauge"
  [startValue]="0"
  [endValue]="200"
  [values]="[121.4, 135.4, 115.9, 141.1, 127.5]"
>
  <dxo-bar-gauge-label [visible]="false"></dxo-bar-gauge-label>
  <dxo-bar-gauge-tooltip
    [enabled]="true"
    [customizeTooltip]="customizeTooltip"
  ></dxo-bar-gauge-tooltip>
  <dxo-bar-gauge-export [enabled]="true"></dxo-bar-gauge-export>
  <dxo-bar-gauge-title text="Average Speed by Racer">
    <dxo-bar-gauge-font [size]="28"></dxo-bar-gauge-font>
  </dxo-bar-gauge-title>
  <dxo-bar-gauge-legend
    [visible]="true"
    verticalAlignment="bottom"
    horizontalAlignment="center"
    [customizeText]="customizeText"
  >
  </dxo-bar-gauge-legend>
</dx-bar-gauge>
