<dx-bar-gauge
  id="gauge"
  [startValue]="-5"
  [endValue]="5"
  [baseValue]="0"
  [values]="[-2.13, 1.48, -3.09, 4.52, 4.9, 3.9]"
  palette="ocean"
>

  </dxo-bar-gauge-title>
</dx-bar-gauge>
