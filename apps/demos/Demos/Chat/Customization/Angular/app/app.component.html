<div class="demo-container">
  <div class="chat-container">
    <dx-chat
      #chat
      [user]="currentUser"
      [items]="messages$ | async"
      [showAvatar]="showAvatar"
      [showUserName]="showUserName"
      [showDayHeaders]="showDayHeaders"
      [showMessageTimestamp]="showMessageTimestamp"
      [dayHeaderFormat]="dayHeaderFormat[0]"
      [messageTimestampFormat]="messageTimestampFormat[0]"
      [disabled]="false"
      (onMessageEntered)="onMessageEntered($event)"
    >
    </dx-chat>
  </div>

  <div class="options">
    <div class="caption">Options</div>

    <div class="option">
      <dx-check-box
        text="Avatar"
        [(value)]="chat.showAvatar"
      ></dx-check-box>
    </div>

    <div class="option">
      <dx-check-box
        text="User Name"
        [(value)]="chat.showUserName"
      ></dx-check-box>
    </div>

    <div class="option-separator"></div>

    <div class="option">
      <dx-check-box
        text="Day Header"
        [(value)]="chat.showDayHeaders"
      ></dx-check-box>
    </div>

    <div class="option">
      <span>Day Header Format:</span>
      <dx-select-box
        [items]="dayHeaderFormat"
        [(value)]="chat.dayHeaderFormat"
        [inputAttr]="dayHeaderLabel"
      ></dx-select-box>
    </div>

    <div class="option-separator"></div>

    <div class="option">
      <dx-check-box
        text="Message Timestamp"
        [(value)]="chat.showMessageTimestamp"
      ></dx-check-box>
    </div>

    <div class="option">
      <span>Message Timestamp Format:</span>
      <dx-select-box
        [items]="messageTimestampFormat"
        [(value)]="chat.messageTimestampFormat"
        [inputAttr]="messageTimestampLabel"
      ></dx-select-box>
    </div>

    <div class="option-separator"></div>

    <div class="option">
      <dx-check-box
        text="Disable Chat"
        [(value)]="chat.disabled"
      ></dx-check-box>
    </div>
  </div>
</div>
