<div class="demo-container">
  <div class="chat-container">
    <dx-chat
      #chat
      [user]="currentUser"
      [items]="messages$ | async"
      [showAvatar] = "true"
      [showUserName] = "true"
      [showDayHeaders] = "true"
      [showMessageTimestamp] = "true"
      [dayHeaderFormat] = "dayHeaderFormat[0]"
      [messageTimestampFormat] = "messageTimestampFormat[0]"
      [disabled] = "false"
      (onMessageEntered)="onMessageEntered($event)"
    >
    </dx-chat>
  </div>

  <div class="options">
    <div class="caption">Options</div>

    <div class="option">
      <dx-check-box
        text="Show Avatar"
        [(value)]="chat.showAvatar"
      ></dx-check-box>
    </div>

    <div class="option">
      <dx-check-box
        text="Show Username"
        [(value)]="chat.showUserName"
      ></dx-check-box>
    </div>

    <div class="option-separator"></div>

    <div class="option">
      <dx-check-box
        text="Show Day Headers"
        [(value)]="chat.showDayHeaders"
      ></dx-check-box>
    </div>

    <div class="option">
      <span>Day Headers Format:</span>
      <dx-select-box
        [items] = "dayHeaderFormat"
        [(value)] = "chat.dayHeaderFormat"
      ></dx-select-box>
    </div>

    <div class="option-separator"></div>

    <div class="option">
      <dx-check-box
        text="Show Message Timestamp"
        [(value)]="chat.showMessageTimestamp"
      ></dx-check-box>
    </div>

    <div class="option">
      <span>Message Timestamp Format:</span>
      <dx-select-box
        [items] = "messageTimestampFormat"
        [(value)] = "chat.messageTimestampFormat"
      ></dx-select-box>
    </div>

    <div class="option-separator"></div>

    <div class="option">
      <dx-check-box
        text="Chat Disabled"
        [(value)]="chat.disabled"
      ></dx-check-box>
    </div>
  </div>
</div>
