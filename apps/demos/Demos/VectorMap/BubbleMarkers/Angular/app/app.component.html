<dx-vector-map id="vector-map" [bounds]="[-180, 85, 180, -60]">
  <dxo-vector-map-tooltip
    [enabled]="true"
    [customizeTooltip]="customizeTooltip"
  ></dxo-vector-map-tooltip>
  <dxi-vector-map-layer [dataSource]="worldMap" [hoverEnabled]="false"></dxi-vector-map-layer>
  <dxi-vector-map-layer
    [dataSource]="markers"
    [minSize]="20"
    [maxSize]="40"
    [sizeGroups]="[0, 8000, 10000, 50000]"
    [opacity]="0.8"
    name="bubbles"
    elementType="bubble"
    dataField="value"
  ></dxi-vector-map-layer>
  <dxi-vector-map-legend
    markerShape="circle"
    [customizeText]="customizeText"
    [customizeItems]="customizeItems"
  >
    <dxo-vector-map-source layer="bubbles" grouping="size"></dxo-vector-map-source>
  </dxi-vector-map-legend>
</dx-vector-map>
