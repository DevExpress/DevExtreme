<dx-data-grid
  id="grid"
  [dataSource]="employees"
  [showBorders]="true"
  keyExpr="ID"
  (onSelectionChanged)="selectedChanged($event)"
>
  <dxo-data-grid-selection mode="single"></dxo-data-grid-selection>
  <dxo-data-grid-paging [enabled]="false"></dxo-data-grid-paging>
  <dxo-data-grid-editing mode="popup">
    <dxo-data-grid-texts confirmDeleteMessage=""></dxo-data-grid-texts>
  </dxo-data-grid-editing>

  <dxi-data-grid-column
    dataField="Prefix"
    caption="Title"
  ></dxi-data-grid-column>
  <dxi-data-grid-column dataField="FirstName"></dxi-data-grid-column>
  <dxi-data-grid-column dataField="LastName"></dxi-data-grid-column>
  <dxi-data-grid-column
    dataField="Position"
    [width]="130"
  ></dxi-data-grid-column>
  <dxi-data-grid-column dataField="StateID" [width]="125" caption="State">
    <dxo-data-grid-lookup
      [dataSource]="states"
      displayExpr="Name"
      valueExpr="ID"
    ></dxo-data-grid-lookup>
  </dxi-data-grid-column>
  <dxi-data-grid-column
    dataField="BirthDate"
    [width]="125"
    dataType="date"
  ></dxi-data-grid-column>
</dx-data-grid>

<dx-speed-dial-action
  icon="add"
  label="Add row"
  [index]="1"
  (onClick)="addRow()"
>
</dx-speed-dial-action>
<dx-speed-dial-action
  icon="trash"
  label="Delete row"
  [index]="2"
  [visible]="selectedRowIndex !== -1"
  (onClick)="deleteRow()"
>
</dx-speed-dial-action>
<dx-speed-dial-action
  icon="edit"
  label="Edit row"
  [index]="3"
  [visible]="selectedRowIndex !== -1"
  (onClick)="editRow()"
>
</dx-speed-dial-action>

<div class="options">
  <div class="caption">Options</div>
  <div class="option">
    <span>Direction: </span>
    <dx-select-box
      [dataSource]="['auto', 'up', 'down']"
      value="auto"
      [inputAttr]="{ 'aria-label': 'Direction' }"
      (onSelectionChanged)="directionChanged($event)"
    ></dx-select-box>
  </div>
</div>
