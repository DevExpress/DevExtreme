<form action="your-action" (submit)="onFormSubmit($event)">
  <dx-form
    id="form"
    (onOptionChanged)="onOptionChanged($event)"
    [formData]="customer"
    [readOnly]="false"
    [showColonAfterLabel]="true"
    [showValidationSummary]="true"
    validationGroup="customerData"
  >
    <dxi-form-item itemType="group" caption="Credentials">
      <dxi-form-item dataField="Email" [editorOptions]="emailEditorOptions">
        <dxi-form-validation-rule type="required" message="Email is required">
        </dxi-form-validation-rule>
        <dxi-form-validation-rule type="email" message="Email is invalid">
        </dxi-form-validation-rule>
        <dxi-form-validation-rule
          type="async"
          message="Email is already registered"
          [validationCallback]="asyncValidation"
        >
        </dxi-form-validation-rule>
      </dxi-form-item>
      <dxi-form-item dataField="Password" [editorOptions]="passwordEditorOptions">
        <dxi-form-validation-rule type="required" message="Password is required">
        </dxi-form-validation-rule>
      </dxi-form-item>
      <dxi-form-item
        name="ConfirmPassword"
        editorType="dxTextBox"
        dataField="ConfirmPassword"
        [editorOptions]="confirmPasswordEditorOptions"
      >
        <dxo-form-label text="Confirm Password"> </dxo-form-label>
        <dxi-form-validation-rule
          type="required"
          message="Confirm Password is required"
        >
        </dxi-form-validation-rule>
        <dxi-form-validation-rule
          type="compare"
          [comparisonTarget]="passwordComparison"
          message="Password and Confirm Password do not match"
        >
        </dxi-form-validation-rule>
      </dxi-form-item>
    </dxi-form-item>
    <dxi-form-item itemType="group" caption="Personal Data">
      <dxi-form-item dataField="Name" [editorOptions]="nameEditorOptions">
        <dxi-form-validation-rule type="required" message="Name is required">
        </dxi-form-validation-rule>
        <dxi-form-validation-rule
          type="pattern"
          [pattern]="namePattern"
          message="Do not use digits in the Name"
        >
        </dxi-form-validation-rule>
      </dxi-form-item>
      <dxi-form-item
        dataField="Date"
        editorType="dxDateBox"
        [editorOptions]="dateBoxOptions"
      >
        <dxo-form-label text="Date of birth"> </dxo-form-label>
        <dxi-form-validation-rule
          type="required"
          message="Date of birth is required"
        >
        </dxi-form-validation-rule>
        <dxi-form-validation-rule
          type="range"
          [max]="maxDate"
          message="You must be at least 21 years old"
        >
        </dxi-form-validation-rule>
      </dxi-form-item>
      <dxi-form-item
        dataField="VacationDates"
        editorType="dxDateRangeBox"
        [editorOptions]="dateRangeBoxOptions"
      >
        <dxo-form-label text="Vacation Dates"> </dxo-form-label>
        <dxi-form-validation-rule
          type="custom"
          message="The vacation period must not exceed 25 days"
          [validationCallback]="validateVacationDatesRange"
        >
        </dxi-form-validation-rule>
        <dxi-form-validation-rule
          type="custom"
          message="Both start and end dates must be selected"
          [validationCallback]="validateVacationDatesPresence"
        >
        </dxi-form-validation-rule>
      </dxi-form-item>
    </dxi-form-item>
    <dxi-form-item itemType="group" caption="Billing address">
      <dxi-form-item
        dataField="Country"
        editorType="dxSelectBox"
        [editorOptions]="{ dataSource: countries }"
      >
        <dxi-form-validation-rule type="required" message="Country is required">
        </dxi-form-validation-rule>
      </dxi-form-item>
      <dxi-form-item
        dataField="City"
        editorType="dxAutocomplete"
        [editorOptions]="{ dataSource: cities, minSearchLength: 2 }"
      >
        <dxi-form-validation-rule
          type="pattern"
          [pattern]="cityPattern"
          message="Do not use digits in the City name"
        >
        </dxi-form-validation-rule>
        <dxi-form-validation-rule
          type="stringLength"
          [min]="2"
          message="City must have at least 2 symbols"
        >
        </dxi-form-validation-rule>
        <dxi-form-validation-rule type="required" message="City is required">
        </dxi-form-validation-rule>
      </dxi-form-item>
      <dxi-form-item dataField="Address" [editorOptions]="addressEditorOptions">
        <dxi-form-validation-rule type="required" message="Address is required">
        </dxi-form-validation-rule>
      </dxi-form-item>
      <dxi-form-item
        dataField="Phone"
        helpText="Enter the phone number in USA phone format"
        [editorOptions]="phoneEditorOptions"
      >
        <dxi-form-validation-rule
          type="pattern"
          [pattern]="phonePattern"
          message="The phone must have a correct USA phone format"
        >
        </dxi-form-validation-rule>
      </dxi-form-item>
    </dxi-form-item>

    <dxi-form-item
      itemType="group"
      cssClass="last-group"
      [colCountByScreen]="colCountByScreen"
    >
      <dxi-form-item
        itemType="simple"
        dataField="Accepted"
        editorType="dxCheckBox"
        [editorOptions]="{
          text: 'I agree to the Terms and Conditions',
          width: 270,
          value: false
        }"
      >
        <dxo-form-label [visible]="false"> </dxo-form-label>
        <dxi-form-validation-rule
          type="compare"
          [comparisonTarget]="checkComparison"
          message="You must agree to the Terms and Conditions"
        >
        </dxi-form-validation-rule>
      </dxi-form-item>

      <dxi-form-item
        itemType="group"
        cssClass="buttons-group"
        [colCountByScreen]="colCountByScreen"
      >
        <dxi-form-item
          name="Reset"
          itemType="button"
          [buttonOptions]="resetButtonOptions"
        >
        </dxi-form-item>
        <dxi-form-item itemType="button" [buttonOptions]="registerButtonOptions">
        </dxi-form-item>
      </dxi-form-item>
    </dxi-form-item>
  </dx-form>
</form>
