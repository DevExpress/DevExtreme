<dx-scheduler
  timeZone="America/Los_Angeles"
  [dataSource]="appointmentsData"
  [views]="['workWeek']"
  currentView="workWeek"
  [currentDate]="currentDate"
  [startDayHour]="9"
  [endDayHour]="19"
  [height]="600"
>
  <dxi-scheduler-resource
    fieldExpr="roomId"
    label="Room"
    [dataSource]="rooms"
    [useColorAsDefault]="currentResource === 'Room'"
    icon="conferenceroomoutline"
  >
  </dxi-scheduler-resource>
  <dxi-scheduler-resource
    fieldExpr="priorityId"
    label="Priority"
    [dataSource]="priorities"
    [useColorAsDefault]="currentResource === 'Priority'"
    icon="tags"
  >
  </dxi-scheduler-resource>
  <dxi-scheduler-resource
    fieldExpr="assigneeId"
    label="Assignee"
    [allowMultiple]="true"
    [dataSource]="assignees"
    [useColorAsDefault]="currentResource === 'Assignee'"
    icon="user"
  >
  </dxi-scheduler-resource>

  <dxo-scheduler-editing>
    <dxo-scheduler-form>
      <dxi-scheduler-item name="mainGroup">
        <dxi-scheduler-item name="subjectGroup"></dxi-scheduler-item>
        <dxi-scheduler-item name="dateGroup"></dxi-scheduler-item>
        <dxi-scheduler-item name="repeatGroup"></dxi-scheduler-item>
        <dxi-scheduler-item name="resourcesGroup">
          <dxi-scheduler-item
            name="roomIdGroup"
            [colCount]="3"
            [colCountByScreen]="{ xs: 3 }"
          >
            <dxi-scheduler-item name="roomIdIcon"></dxi-scheduler-item>
            <dxi-scheduler-item name="roomIdEditor"></dxi-scheduler-item>
            <dxi-scheduler-item name="priorityIdEditor"></dxi-scheduler-item>
          </dxi-scheduler-item>
          <dxi-scheduler-item name="assigneeIdGroup"></dxi-scheduler-item>
        </dxi-scheduler-item>
        <dxi-scheduler-item name="descriptionGroup"></dxi-scheduler-item>
      </dxi-scheduler-item>
      <dxi-scheduler-item name="recurrenceGroup"></dxi-scheduler-item>
    </dxo-scheduler-form>
  </dxo-scheduler-editing>
</dx-scheduler>

<div class="options">
  <div class="caption">Use colors of:</div>
  <div class="option">
    <dx-radio-group
      [items]="resourcesList"
      [(value)]="currentResource"
      layout="horizontal"
    >
    </dx-radio-group>
  </div>
</div>
