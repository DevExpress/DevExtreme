<dx-scheduler
    timeZone="America/Los_Angeles"
    [dataSource]="dataSource"
    [views]="['day', 'week', 'workWeek', 'month']"
    currentView="workWeek"
    [currentDate]="currentDate"
    [startDayHour]="9"
    [endDayHour]="19"
    [height]="600"
>
    <dxi-resource
        fieldExpr="assigneeId"
        label="Assignee"
        [allowMultiple]="true"
        [dataSource]="assignees"
    >
    </dxi-resource>
    <dxo-toolbar>
        <dxi-item location="before" name="today"></dxi-item>
        <dxi-item location="before" name="dateNavigator"></dxi-item>
        <dxi-item
            location="before"
            locateInMenu="auto"
            widget="dxButton"
            [options]="newEventButtonOptions"
        >
        </dxi-item>
        <dxi-item location="center" locateInMenu="auto">
            <div *dxTemplate>
                <dx-tag-box
                    [items]="assignees"
                    displayExpr="text"
                    valueExpr="id"
                    searchEnabled="true"
                    showSelectionControls="true"
                    maxDisplayedTags="1"
                    [inputAttr]="{ 'aria-label': 'Assignees' }"
                    width="200"
                    (onValueChanged)="onAssigneesChange($event)"
                >
                </dx-tag-box>
            </div>
        </dxi-item>
        <dxi-item location="after" locateInMenu="auto" name="viewSwitcher"></dxi-item>
    </dxo-toolbar>
</dx-scheduler>
