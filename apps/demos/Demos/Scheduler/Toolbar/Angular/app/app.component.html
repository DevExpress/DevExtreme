<dx-scheduler
  timeZone="America/Los_Angeles"
  [dataSource]="dataSource"
  [views]="['day', 'week', 'workWeek', 'month']"
  currentView="workWeek"
  [currentDate]="currentDate"
  [startDayHour]="9"
  [endDayHour]="19"
  [height]="600"
>
  <dxi-scheduler-resource
    fieldExpr="assigneeId"
    label="Assignee"
    [allowMultiple]="true"
    [dataSource]="assignees"
    icon="user"
  >
  </dxi-scheduler-resource>
  <dxo-scheduler-toolbar>
    <dxi-scheduler-toolbar-item
      location="before"
      name="today"
    ></dxi-scheduler-toolbar-item>
    <dxi-scheduler-toolbar-item
      location="before"
      name="dateNavigator"
    ></dxi-scheduler-toolbar-item>
    <dxi-scheduler-toolbar-item
      location="before"
      locateInMenu="auto"
      widget="dxButton"
      [options]="newEventButtonOptions"
    >
    </dxi-scheduler-toolbar-item>
    <dxi-scheduler-toolbar-item location="before" locateInMenu="auto">
      <div *dxTemplate>
        <dx-select-box
          placeholder="Select Employee"
          [items]="assignees"
          [showClearButton]="true"
          displayExpr="text"
          valueExpr="id"
          [inputAttr]="{ 'aria-label': 'Select Employee' }"
          [width]="200"
          (onValueChanged)="onAssigneesChange($event)"
        >
        </dx-select-box>
      </div>
    </dxi-scheduler-toolbar-item>
    <dxi-scheduler-toolbar-item
      location="after"
      locateInMenu="auto"
      name="viewSwitcher"
    ></dxi-scheduler-toolbar-item>
  </dxo-scheduler-toolbar>
</dx-scheduler>
