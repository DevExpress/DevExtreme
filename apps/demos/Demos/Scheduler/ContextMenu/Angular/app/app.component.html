<ng-template #contextMenuItemTemplate let-e>
  @if(e.color) {
  <div class="item-badge" [style.background-color]="e.color"></div>
  }
  <div class="item-text">{{ e.text }}</div>
</ng-template>

<dx-context-menu
  [items]="appointmentContextMenuItems"
  target=".dx-scheduler-appointment"
  (onItemClick)="onContextMenuItemClick($event)"
  [width]="200"
>
  <div *dxTemplate="let e of 'item'">
    <ng-container
      *ngTemplateOutlet="contextMenuItemTemplate; context: { $implicit: e }"
    ></ng-container>
  </div>
</dx-context-menu>
<dx-context-menu
  [items]="cellContextMenuItems"
  target=".dx-scheduler-date-table-cell"
  (onItemClick)="onContextMenuItemClick($event)"
  [width]="200"
>
  <div *dxTemplate="let e of 'item'">
    <ng-container
      *ngTemplateOutlet="contextMenuItemTemplate; context: { $implicit: e }"
    ></ng-container>
  </div>
</dx-context-menu>

<dx-scheduler
  timeZone="America/Los_Angeles"
  [crossScrollingEnabled]="crossScrollingEnabled"
  [dataSource]="appointmentsData"
  [views]="['day', 'month']"
  currentView="month"
  [groups]="groups"
  recurrenceEditMode="series"
  [currentDate]="currentDate"
  (onCellContextMenu)="onCellContextMenu($event)"
  (onAppointmentContextMenu)="onAppointmentContextMenu($event)"
  [startDayHour]="9"
  [height]="730"
>
  <dxi-scheduler-resource
    fieldExpr="roomId"
    label="room"
    [dataSource]="resourcesData"
    icon="conferenceroomoutline"
  ></dxi-scheduler-resource>
</dx-scheduler>
