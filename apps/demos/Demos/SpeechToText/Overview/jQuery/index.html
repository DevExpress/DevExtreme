<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">
  <head>
    <title>DevExtreme Demo</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <script src="../../../../node_modules/jquery/dist/jquery.min.js"></script>
    <link rel="stylesheet" type="text/css" href="../../../../node_modules/devextreme/dist/css/dx.light.css" />
    <script src="../../../../node_modules/devextreme-dist/js/dx.all.js"></script>
    <link rel="stylesheet" type="text/css" href="styles.css" />
    <script src="data.js"></script>
    <script src="index.js"></script>
  </head>

  <body class="dx-viewport">
    <div class="demo-container">
      <div class="speech-to-text-container">
        <span>Use voice recognition (speech to text)</span>
        <div id="speech-to-text"></div>
        <div id="text-area"></div>
        <div id="clear-button"></div>
      </div>
      <div class="options">
        <div class="caption">Options</div>
        <div class="option">
          <div>Display Mode</div>
          <div id="display-mode"></div>
        </div>
        <div class="option">
          <div>Styling Mode</div>
          <div id="styling-mode"></div>
        </div>
        <div class="option">
          <div>Type</div>
          <div id="type"></div>
        </div>
        <div class="switch">
          <div id="disabled"></div>
          <span>Disabled</span>
        </div>
        <div class="option-separator"></div>
        <div class="option">
          <div>Language</div>
          <div id="language"></div>
        </div>
        <div class="switch">
          <div id="interim-results"></div>
          <span>Interim Results</span>
        </div>
        <div class="switch">
          <div id="continuous-recognition"></div>
          <span>Continuous Recognition</span>
        </div>
        <div class="option-separator"></div>
        <div class="switch">
          <div id="animation"></div>
          <span>Animation</span>
        </div>
      </div>
      <div id="toast"></div>
    </div>
  </body>
</html>
