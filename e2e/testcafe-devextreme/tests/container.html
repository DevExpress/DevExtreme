    <style>
        * { caret-color: transparent !important; }
        .dx-scheduler .dx-scrollable-scroll { visibility: hidden !important; }
        body:has(#tabPanel) { min-height: 500px; }

        /* Match TestCafe headless Chrome scrollbar (15px) for consistent screenshots.
           TestCafe etalons were captured with 15px scrollbar, Playwright headless has 0px. */
        html { overflow-y: scroll !important; }
        ::-webkit-scrollbar { width: 15px !important; }
        ::-webkit-scrollbar-track { background: transparent !important; }
        ::-webkit-scrollbar-thumb { background: transparent !important; }
    </style>
