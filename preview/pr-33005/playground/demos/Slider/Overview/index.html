<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">
  <head>
    <title>DevExtreme Demo</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    
    
    
    <link rel="stylesheet" type="text/css" href="styles.css" />
    
  </head>
  <body class="dx-viewport">
    <div class="demo-container">
      <div class="form">
        <div class="dx-fieldset">
          <div class="dx-field">
            <div class="dx-field-label">Default mode</div>
            <div class="dx-field-value">
              <div id="slider-simple"></div>
            </div>
          </div>
          <div class="dx-field custom-height-slider">
            <div class="dx-field-label">With labels</div>
            <div class="dx-field-value">
              <div id="slider-with-label"></div>
            </div>
          </div>
          <div class="dx-field custom-height-slider">
            <div class="dx-field-label">With tooltip</div>
            <div class="dx-field-value">
              <div id="slider-with-tooltip"></div>
            </div>
          </div>
          <div class="dx-field">
            <div class="dx-field-label">Without range highlighting</div>
            <div class="dx-field-value">
              <div id="slider-with-hide-range"></div>
            </div>
          </div>
          <div class="dx-field">
            <div class="dx-field-label">With discrete step</div>
            <div class="dx-field-value">
              <div id="slider-with-step"></div>
            </div>
          </div>
          <div class="dx-field">
            <div class="dx-field-label">Disabled</div>
            <div class="dx-field-value">
              <div id="slider-disabled"></div>
            </div>
          </div>
        </div>
        <div class="dx-fieldset">
          <div class="dx-fieldset-header">Process Value Changes</div>
          <div class="dx-field">
            <div class="dx-field-label">On handle movement</div>
            <div class="dx-field-value">
              <div id="slider-on-handle-move"></div>
            </div>
          </div>
          <div class="dx-field">
            <div class="dx-field-label">On handle release</div>
            <div class="dx-field-value">
              <div id="slider-on-handle-release"></div>
            </div>
          </div>
          <div class="dx-field">
            <div class="dx-field-label">Slider value</div>
            <div class="dx-field-value">
              <div id="slider-value"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  <script type="module">
  import '../../../demo-init.js';
  const srcs = ["index.js"];
  for (const src of srcs) {
    await new Promise((resolve) => {
      const s = document.createElement('script');
      s.src = src;
      s.onload = resolve;
      document.body.appendChild(s);
    });
  }
</script>
</body>
</html>
