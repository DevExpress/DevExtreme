<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">
  <head>
    <title>DevExtreme Demo</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    
    
    
    
    <link rel="stylesheet" type="text/css" href="styles.css" />
    
  </head>
  <body class="dx-viewport">
    <div class="demo-container">
      <div id="container">
        <div class="header">John Heart</div>

        <div class="show-panel"></div>

        <div id="employee">
          <p> Birth date: <b class="birth-date"></b> </p>
          <p class="address">
            Address:<br />
            <b class="city"></b><br />
            <span class="zipcode"></span>
            <span class="address-info"></span>
          </p>
          <p>
            Phone:
            <b class="mobile-phone"></b><br />
            Email: <b class="email"></b>
          </p>
        </div>

        <div class="loadpanel"></div>

        <div class="options">
          <div class="caption">Options</div>
          <div class="option">
            <div class="with-indicator"></div>
          </div>
          <div class="option">
            <div class="with-overlay"></div>
          </div>
          <div class="option">
            <div class="with-pane"></div>
          </div>
          <div class="option">
            <div class="outside-click"></div>
          </div>
        </div>
      </div>
    </div>
  <script type="module">
  import '../../../demo-init.js';
  const srcs = ["data.js","index.js"];
  for (const src of srcs) {
    await new Promise((resolve) => {
      const s = document.createElement('script');
      s.src = src;
      s.onload = resolve;
      document.body.appendChild(s);
    });
  }
</script>
</body>
</html>
