<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">
  <head>
    <title>DevExtreme Demo</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    
    
    
    
    <link rel="stylesheet" type="text/css" href="styles.css" />
    
  </head>

  <body class="dx-viewport">
    <div class="demo-container">
      <div class="form">
        <h4>Employees</h4>
        <div id="treeview"></div>
        <div class="selected-container">
          Selected employees
          <div id="selected-employees"></div>
        </div>
      </div>

      <div class="options">
        <div class="caption">Options</div>
        <div class="options-container">
          <div class="options-section">
            <div class="option">
              <span>Checkbox Visibility:</span>
              <div class="editor-container">
                <div id="checkBoxVisibility"></div>
              </div>
            </div>
            <div class="option">
              <span>Selection Mode:</span>
              <div class="editor-container">
                <div id="selectionMode"></div>
              </div>
            </div>
            <div class="option">
              <span>Disabled Node Selection Mode:</span>
              <div class="editor-container">
                <div id="disabledNodeSelectionMode"></div>
              </div>
            </div>
          </div>
          <div class="options-section">
            <div class="option">
              <div class="caption-placeholder">&nbsp;</div>
              <div class="editor-container">
                <div id="recursiveSelection"></div>
              </div>
            </div>
            <div class="option">
              <div class="caption-placeholder">&nbsp;</div>
              <div class="editor-container">
                <div id="selectOnClick"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  <script type="module">
  import '../../../demo-init.js';
  const srcs = ["data.js","index.js"];
  for (const src of srcs) {
    await new Promise((resolve) => {
      const s = document.createElement('script');
      s.src = src;
      s.onload = resolve;
      document.body.appendChild(s);
    });
  }
</script>
</body>
</html>
