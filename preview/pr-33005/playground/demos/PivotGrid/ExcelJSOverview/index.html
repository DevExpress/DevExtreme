  </head>
  <body class="dx-viewport">
    <div class="demo-container">
      <div id="sales"></div>
    </div>
  <script type="module">
  import '../../../demo-init.js';
  const srcs = ["data.js","index.js"];
  for (const src of srcs) {
    await new Promise((resolve) => {
      const s = document.createElement('script');
      s.src = src;
      s.onload = resolve;
      document.body.appendChild(s);
    });
  }
</script>
</body>
