<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">
  <head>
    <title>DevExtreme Demo</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    
    
    
    <link rel="stylesheet" type="text/css" href="styles.css" />
    
  </head>
  <body class="dx-viewport">
    <div class="demo-container">
      <div class="long-title"><h3>Daily temperature</h3></div>
      <div id="chart-demo">
        <table class="demo-table">
          <tr>
            <th><div class="dx-screen-reader-only">Week</div></th>
            <th>June</th>
            <th>July</th>
            <th>August</th>
          </tr>
          <tr>
            <th>First week</th>
            <td><div class="bullet june-1"></div></td>
            <td><div class="bullet july-1"></div></td>
            <td><div class="bullet august-1"></div></td>
          </tr>
          <tr>
            <th>Second week</th>
            <td><div class="bullet june-2"></div></td>
            <td><div class="bullet july-2"></div></td>
            <td><div class="bullet august-2"></div></td>
          </tr>
          <tr>
            <th>Third week</th>
            <td><div class="bullet june-3"></div></td>
            <td><div class="bullet july-3"></div></td>
            <td><div class="bullet august-3"></div></td>
          </tr>
          <tr>
            <th>Fourth week</th>
            <td><div class="bullet june-4"></div></td>
            <td><div class="bullet july-4"></div></td>
            <td><div class="bullet august-4"></div></td>
          </tr>
        </table>
      </div>
    </div>
  <script type="module">
  import '../../../demo-init.js';
  const srcs = ["index.js"];
  for (const src of srcs) {
    await new Promise((resolve) => {
      const s = document.createElement('script');
      s.src = src;
      s.onload = resolve;
      document.body.appendChild(s);
    });
  }
</script>
</body>
</html>
