<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">
  <head>
    <title>DevExtreme Demo</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    
    
    
    <link rel="stylesheet" type="text/css" href="styles.css" />
    
  </head>
  <body class="dx-viewport">
    <div class="demo-container">
      <div class="form">
        <div class="label">Default mode</div>
        <div>
          <img alt="ExcelRemote IR" id="product1" src="../../../../images/products/17.png" />
          <div id="tooltip1">ExcelRemote IR</div>
        </div>
        <div class="label">With template</div>
        <div>
          <img alt="SuperPlasma 50" id="product2" src="../../../../images/products/3.png" />
          <div id="tooltip2"></div>
        </div>
        <div class="label">With animation</div>
        <div>
          <img alt="Projector PlusHD" id="product3" src="../../../../images/products/15.png" />
          <div id="tooltip3">Projector PlusHD</div>
        </div>
      </div>
    </div>
  <script type="module">
  import '../../../demo-init.js';
  const srcs = ["index.js"];
  for (const src of srcs) {
    await new Promise((resolve) => {
      const s = document.createElement('script');
      s.src = src;
      s.onload = resolve;
      document.body.appendChild(s);
    });
  }
</script>
</body>
</html>
