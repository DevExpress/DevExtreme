<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">
  <head>
    <title>DevExtreme Demo</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    
    
    
    
    <link rel="stylesheet" type="text/css" href="styles.css" />
    
  </head>
  <body class="dx-viewport">
    <div class="demo-container">
      <div id="form">
        <div class="options">
          <div class="caption">Options</div>
          <div class="dx-fieldset">
            <div class="dx-field">
              <div class="dx-field-label">Language</div>
              <div class="dx-field-value">
                <div id="select-language"></div>
              </div>
            </div>
          </div>
        </div>
        <div class="dx-fieldset">
          <div class="dx-field">
            <div class="dx-field-label">Text Box</div>
            <div class="dx-field-value">
              <div id="text-box"></div>
            </div>
          </div>
          <div class="dx-field">
            <div class="dx-field-label">Number Box</div>
            <div class="dx-field-value">
              <div id="number-box"></div>
            </div>
          </div>
          <div class="dx-field">
            <div class="dx-field-label">Select Box</div>
            <div class="dx-field-value">
              <div id="select-box"></div>
            </div>
          </div>
          <div class="dx-field">
            <div class="dx-field-label">Tag Box</div>
            <div class="dx-field-value">
              <div id="tag-box"></div>
            </div>
          </div>
          <div class="dx-field">
            <div class="dx-field-label">Text Area</div>
            <div class="dx-field-value">
              <div id="text-area"></div>
            </div>
          </div>
          <div class="dx-field">
            <div class="dx-field-label">Autocomplete</div>
            <div class="dx-field-value">
              <div id="autocomplete"></div>
            </div>
          </div>
          <div class="dx-field">
            <div class="dx-field-label">Check Box</div>
            <div class="dx-field-value">
              <div id="checkbox"></div>
            </div>
          </div>
          <div class="dx-field">
            <div class="dx-field-label">Switch</div>
            <div class="dx-field-value">
              <div id="switch"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  <script type="module">
  import '../../../demo-init.js';
  const srcs = ["data.js","index.js"];
  for (const src of srcs) {
    await new Promise((resolve) => {
      const s = document.createElement('script');
      s.src = src;
      s.onload = resolve;
      document.body.appendChild(s);
    });
  }
</script>
</body>
</html>
