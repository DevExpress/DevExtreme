<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">
  <head>
    <title>DevExtreme Demo</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    
    
    
    
    
    <link rel="stylesheet" type="text/css" href="styles.css" />
  </head>
  <body class="dx-viewport">
    <div class="demo-container">
      <div class="options-panel">
        <div class="caption">Options</div>
        <div class="options-container">
          <div class="option"> <span>Selection Mode</span><div id="selection-mode"></div> </div>
          <div class="option"> <span>Show Checkboxes Mode</span><div id="show-checkboxes-mode"></div> </div>
          <div class="option"> <span>Select All Mode</span><div id="select-all-mode"></div> </div>
          <div class="option"> <div id="allow-select-all"></div> </div>
        </div>
      </div>
      <div id="card-view"></div>
    </div>
  <script type="module">
  import '../../../demo-init.js';
  const srcs = ["data.js","index.js"];
  for (const src of srcs) {
    await new Promise((resolve) => {
      const s = document.createElement('script');
      s.src = src;
      s.onload = resolve;
      document.body.appendChild(s);
    });
  }
</script>
</body>
</html>
