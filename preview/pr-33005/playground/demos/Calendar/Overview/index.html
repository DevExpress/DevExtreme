<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">
  <head>
    <title>DevExtreme Demo</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    
    
    
    <link rel="stylesheet" type="text/css" href="styles.css" />
    
  </head>
  <body class="dx-viewport">
    <div class="demo-container" id="calendar-demo">
      <div class="calendar-container">
        <div id="calendar"></div>
      </div>
      <div class="options">
        <div class="caption">Options</div>
        <div class="option">
          <span>Zoom level</span>
          <div id="zoom-level"></div>
        </div>
        <div class="option">
          <span>Selected date</span>
          <div id="selected-date"></div>
        </div>
        <div class="option">
          <div id="custom-cell"></div>
        </div>
        <div class="option">
          <div id="disabled"></div>
        </div>
        <div class="caption option">
          <span>Week numeration</span>
        </div>
        <div class="option">
          <div id="week-numbers"></div>
        </div>
        <div class="option">
          <span>First day of week</span>
          <div id="first-day-of-week"></div>
        </div>
        <div class="option">
          <span>Week number rule</span>
          <div id="week-number-rule"></div>
        </div>
      </div>
    </div>
  <script type="module">
  import '../../../demo-init.js';
  const srcs = ["index.js"];
  for (const src of srcs) {
    await new Promise((resolve) => {
      const s = document.createElement('script');
      s.src = src;
      s.onload = resolve;
      document.body.appendChild(s);
    });
  }
</script>
</body>
</html>
