<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">
  <head>
    <title>DevExtreme Demo</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    
    
    
    
    
    
    
    
    
    
    <link rel="stylesheet" type="text/css" href="styles.css" />
    
  </head>
  <body class="dx-viewport">
    <div class="demo-container">
      <div id="vector-map"></div>
      <div class="options">
        <div class="caption">Options</div>
        <div class="wrapper-option">
          <div class="column">
            <div class="option">
              <span>Continent</span>
              <div id="choose-continent"></div>
            </div>
            <div class="option">
              <span>Zoom factor</span>
              <div id="zoom-factor"></div>
            </div>
            <div class="option">
              <span>Center</span>
              <div id="center"></div>
            </div>
          </div>
          <div class="column">
            <div class="option">
              <span>Pan control</span>
              <div id="switchPan"></div>
            </div>
            <div class="option">
              <span>Zoom bar</span>
              <div id="switchZoom"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  <script type="module">
  import '../../../demo-init.js';
  const srcs = ["../../../vectormap-data/world.js","../../../vectormap-data/africa.js","../../../vectormap-data/canada.js","../../../vectormap-data/eurasia.js","../../../vectormap-data/europe.js","../../../vectormap-data/usa.js","data.js","index.js"];
  for (const src of srcs) {
    await new Promise((resolve) => {
      const s = document.createElement('script');
      s.src = src;
      s.onload = resolve;
      document.body.appendChild(s);
    });
  }
</script>
</body>
</html>
