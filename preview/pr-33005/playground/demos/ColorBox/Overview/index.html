<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">
  <head>
    <title>DevExtreme Demo</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    
    
    
    <link rel="stylesheet" type="text/css" href="styles.css" />
    
  </head>
  <body class="dx-viewport">
    <div class="demo-container">
      <div class="form">
        <div class="dx-fieldset">
          <div class="dx-field">
            <div class="dx-field-label">Default mode</div>
            <div class="dx-field-value">
              <div id="color-box-simple"></div>
            </div>
          </div>
          <div class="dx-field">
            <div class="dx-field-label">With alpha channel editing</div>
            <div class="dx-field-value">
              <div id="color-box-edit-alpha-channel"></div>
            </div>
          </div>
          <div class="dx-field">
            <div class="dx-field-label">Custom button captions</div>
            <div class="dx-field-value">
              <div id="color-box-edit-button-text"></div>
            </div>
          </div>
          <div class="dx-field">
            <div class="dx-field-label">Read only</div>
            <div class="dx-field-value">
              <div id="color-box-read-only"></div>
            </div>
          </div>
          <div class="dx-field">
            <div class="dx-field-label">Disabled</div>
            <div class="dx-field-value">
              <div id="color-box-disabled"></div>
            </div>
          </div>
        </div>
        <div class="dx-fieldset">
          <div class="dx-fieldset-header">Event Handling</div>
          <div class="hero-block">
            <div class="color-block">
              <svg class="brush" width="360" height="254">
                <use href="../../../../images/Brush.svg#brush"></use>
              </svg>
              <svg class="superhero dx-color-icon" width="360" height="254">
                <use href="../../../../images/Hero.svg#hero"></use>
              </svg>
            </div>
            <div class="hero-color-box">
              <div id="color-box-with-change-value"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  <script type="module">
  import '../../../demo-init.js';
  const srcs = ["index.js"];
  for (const src of srcs) {
    await new Promise((resolve) => {
      const s = document.createElement('script');
      s.src = src;
      s.onload = resolve;
      document.body.appendChild(s);
    });
  }
</script>
</body>
</html>
