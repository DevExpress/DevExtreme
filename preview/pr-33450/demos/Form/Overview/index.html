<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">
  <head>
    <title>DevExtreme Demo</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    
    
    
    
    <link rel="stylesheet" type="text/css" href="styles.css" />
    
  </head>
  <body class="dx-viewport">
    <div class="demo-container">
      <div id="form-demo">
        <div class="widget-container">
          <div id="select-company-text">Select company:</div>
          <div id="select-company"></div>
          <div id="form"></div>
        </div>
        <div class="options">
          <div class="caption">Options</div>
          <div class="option">
            <span>Label mode:</span>
            <div id="label-mode"></div>
          </div>
          <div class="option">
            <span>Label location:</span>
            <div id="label-location"></div>
          </div>
          <div class="option">
            <span>Columns count:</span>
            <div id="columns-count"></div>
          </div>
          <div class="option">
            <span>Min column width:</span>
            <div id="min-column-width"></div>
          </div>
          <div class="option">
            <span>Form width:</span>
            <div id="width"></div>
          </div>
          <div class="option">
            <div id="read-only"></div>
          </div>
          <div class="option">
            <div id="show-colon"></div>
          </div>
        </div>
      </div>
    </div>
  <script type="module">
  import '../../../demo-init.js';
  const srcs = ["data.js","index.js"];
  for (const src of srcs) {
    await new Promise((resolve) => {
      const s = document.createElement('script');
      s.src = src;
      s.onload = resolve;
      document.body.appendChild(s);
    });
  }
</script>
</body>
</html>
