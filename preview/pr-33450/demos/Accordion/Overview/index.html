<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">
  <head>
    <title>DevExtreme Demo</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    
    
    
    
    
    <link rel="stylesheet" type="text/css" href="styles.css" />
    
  </head>
  <body class="dx-viewport">
    <div class="demo-container">
      <div id="accordion">
        <div id="accordion-container"> </div>

        <div class="options">
          <div class="caption">Options</div>
          <div class="option">
            <div id="multiple-enabled"></div>
          </div>
          <div class="option">
            <div id="collapsible-enabled"></div>
          </div>
          <div class="option">
            <span>Animation duration</span>
            <div id="slider"></div>
          </div>
          <div class="option">
            <span class="caption">Selected Items</span>
            <div id="tagbox"></div>
          </div>
        </div>
      </div>

      <script type="text/html" id="title">
        <div class="header">{{ CompanyName }}</div>
      </script>

      <script type="text/html" id="customer">
        <div class="accodion-item">
          <div>
            <p>
              <b>{{ City }}</b>
              (<span>{{ State }}</span>)
            </p>
            <p>
              <span>{{ Zipcode }}</span>
              <span>{{ Address }}</span>
            </p>
          </div>
          <div>
            <p> Phone: <b>{{ Phone }}</b> </p>
            <p> Fax: <b>{{ Fax }}</b> </p>
            <p>
              Website:
              <span class="accordion-item-link"> {{ Website }} </span>
            </p>
          </div>
        </div>
      </script>
    </div>
  <script type="module">
  import '../../../demo-init.js';
  const srcs = ["../../../mustache/mustache.min.js","data.js","index.js"];
  for (const src of srcs) {
    await new Promise((resolve) => {
      const s = document.createElement('script');
      s.src = src;
      s.onload = resolve;
      document.body.appendChild(s);
    });
  }
</script>
</body>
</html>
