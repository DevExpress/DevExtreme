<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">
  <head>
    <title>DevExtreme Demo</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    
    
    
    
    <link rel="stylesheet" type="text/css" href="styles.css" />
    
  </head>
  <body class="dx-viewport">
    <div class="demo-container">
      <div id="sales"></div>
      <div class="container">
        <div id="sales-fieldchooser"></div>
        <div class="bottom-bar">
          <div id="applyButton"></div>
          <div id="cancelButton"></div>
        </div>
        <div class="options">
          <div class="caption">Options</div>
          <div class="option">
            <span>Choose layout:</span>
            <div class="option-editor" id="layouts"></div>
          </div>
          <div class="option">
            <span>Apply Changes Mode:</span>
            <div class="option-editor" id="applyChangesMode"></div>
          </div>
        </div>
      </div>
    </div>
  <script type="module">
  import '../../../demo-init.js';
  const srcs = ["data.js","index.js"];
  for (const src of srcs) {
    await new Promise((resolve) => {
      const s = document.createElement('script');
      s.src = src;
      s.onload = resolve;
      document.body.appendChild(s);
    });
  }
</script>
</body>
</html>
