<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">
  <head>
    <title>DevExtreme Demo</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    
    
    
    <link rel="stylesheet" type="text/css" href="styles.css" />
    
  </head>
  <body class="dx-viewport">
    <div class="demo-container">
      <div class="dx-fieldset">
        <div class="dx-field">
          <div class="dx-field-label">Integer format</div>
          <div class="dx-field-value">
            <div id="integer"></div>
          </div>
        </div>
        <div class="dx-field">
          <div class="dx-field-label">Currency format</div>
          <div class="dx-field-value">
            <div id="currency"></div>
          </div>
        </div>
        <div class="dx-field">
          <div class="dx-field-label">Accounting format</div>
          <div class="dx-field-value">
            <div id="accounting"></div>
          </div>
        </div>
        <div class="dx-field">
          <div class="dx-field-label">Percent format</div>
          <div class="dx-field-value">
            <div id="percent"></div>
          </div>
        </div>
        <div class="dx-field">
          <div class="dx-field-label">Fixed point format</div>
          <div class="dx-field-value">
            <div id="fixedPoint"></div>
          </div>
        </div>
        <div class="dx-field">
          <div class="dx-field-label">Weight format</div>
          <div class="dx-field-value">
            <div id="weight"></div>
          </div>
        </div>
      </div>
    </div>
  <script type="module">
  import '../../../demo-init.js';
  const srcs = ["index.js"];
  for (const src of srcs) {
    await new Promise((resolve) => {
      const s = document.createElement('script');
      s.src = src;
      s.onload = resolve;
      document.body.appendChild(s);
    });
  }
</script>
</body>
</html>
