name: Default Workflow

concurrency:
  group: wf-${{github.event.pull_request.number || github.sha}}-${{github.workflow}}
  cancel-in-progress: true

on:
  pull_request:
    paths-ignore:
      - 'apps/**/*.md'
  push:
    branches:
      - "[0-9][0-9]_[0-9]"

env:
  NX_SKIP_NX_CACHE: ${{ contains(github.event.pull_request.labels.*.name, 'skip-cache') && 'true' || 'false' }}

jobs:
  main:
    name: main
    runs-on: devextreme-shr2
    timeout-minutes: 30

    steps:
    - name: Get sources
      uses: actions/checkout@v6

    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: '.node-version'

    - uses: pnpm/action-setup@v6
      with:
        run_install: false

    - name: Get pnpm store directory
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

    - uses: actions/cache@v5
      name: Setup pnpm cache
      with:
        path: ${{ env.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-cache-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-cache

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Run targets
      run: >
        pnpm exec nx run-many
        -t lint,test
        -c ci
        --exclude
        devextreme
        devextreme-themebuilder
        devextreme-angular
        devextreme-react
        devextreme-vue
        devextreme-react-storybook
        devextreme-angular-playground
        devextreme-testcafe-tests
        devextreme-demos
        devextreme-react-playground
        devextreme-vue-playground
