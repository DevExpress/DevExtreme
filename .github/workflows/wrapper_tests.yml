name: Wrappers Tests

on:
  pull_request:
    paths-ignore:
      - 'apps/**/*.md'
  push:
    branches: [25_1]

env:
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_TOKEN }}
  NX_SKIP_NX_CACHE: ${{ (github.event_name != 'pull_request' || contains( github.event.pull_request.labels.*.name, 'skip-cache')) && 'true' || 'false' }}
  BUILD_TEST_INTERNAL_PACKAGE: true

jobs:
  build:
    runs-on: devextreme-shr2
    timeout-minutes: 80

    steps:
      - name: Get sources
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v4
        name: Setup pnpm cache
        with:
          path: |
            ${{ env.STORE_PATH }}
            .nx/cache
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store

      - name: Install dependencies
        run: pnpm install

      - name: Build devextreme package
        env:
          BUILD_TEST_INTERNAL_PACKAGE: true
        working-directory: ./packages/devextreme
        run: pnpx nx build

  check-regenerate:
    runs-on: devextreme-shr2
    timeout-minutes: 10

    steps:
      - name: Get sources
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v4
        name: Setup pnpm cache
        with:
          path: |
            ${{ env.STORE_PATH }}
            .nx/cache
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store

      - name: Install dependencies
        run: pnpm install

      - name: Generate wrappers
        run: pnpm run regenerate-all

      - name: Check generated code
        id: check-diff
        uses: DevExpress/github-actions/get-changed-files@v1
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}
          paths: 'packages/devextreme-*/src/**'
          output: changed-files.json

      # - name: Fail if generated code is outdated
      #   shell: bash
      #   run: |
      #     if [ -s changed-files.json ]; then
      #       echo "Generated code is outdated. The following files were changed:"
      #       cat changed-files.json | jq -r '.[]'
      #       echo ""
      #       echo "To update generated code, run: pnpm run regenerate-all"
      #       exit 1
      #     else
      #       echo "No changes in generated code."
      #     fi

      - name: Fail if generated code is outdated
        shell: bash
        run: |
          if ${{ steps.check-diff.outputs.count > 0 }}; then
            echo ${{ steps.check-diff.outputs.files }}
          else
            echo "No changes in generated code."
          fi

      - name: Archive devextreme-metadata artifacts
        uses: actions/upload-artifact@v4
        with:
          name: devextreme-metadata-artifacts
          path: packages/devextreme-metadata/dist/
          retention-days: 7

  test:
    runs-on: devextreme-shr2
    timeout-minutes: 80
    needs: build
    strategy:
      matrix:
        framework: [angular, react, vue]

    steps:
      - name: Get sources
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v4
        name: Setup pnpm cache
        with:
          path: |
            ${{ env.STORE_PATH }}
            .nx/cache
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store

      - name: Install dependencies
        run: pnpm install

      - name: Build wrappers
        run: pnpx nx build devextreme-${{ matrix.framework }}

      - name: Build and Test ${{ matrix.framework }}
        run: |
          if [ "${{ matrix.framework }}" = "angular" ]; then
            pnpx nx test:dev devextreme-angular
            pnpx nx pack devextreme-angular
          elif [ "${{ matrix.framework }}" = "react" ]; then
            pnpx nx test devextreme-react
            pnpx nx pack devextreme-react
          elif [ "${{ matrix.framework }}" = "vue" ]; then
            pnpx nx test devextreme-vue
            pnpx nx pack devextreme-vue
          fi