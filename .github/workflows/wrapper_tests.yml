name: Wrappers Tests

on:
  pull_request:
    paths-ignore:
      - 'apps/**/*.md'
  workflow_dispatch:

env:
  NX_SKIP_NX_CACHE: ${{ (github.event_name != 'pull_request' || contains( github.event.pull_request.labels.*.name, 'skip-cache')) && 'true' || 'false' }}
  BUILD_TEST_INTERNAL_PACKAGE: true
  RUN_TESTS: ${{ (github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'force all tests'))) && 'true' || 'false' }}

jobs:
  check-should-run:
    name: Check if tests should run
    runs-on: devextreme-shr2
    outputs:
      should-run: ${{ steps.check.outputs.should-run }}
    steps:
      - name: Check RUN_TESTS flag
        id: check
        run: echo "should-run=${{ env.RUN_TESTS }}" >> $GITHUB_OUTPUT

  build:
    needs: check-should-run
    if: needs.check-should-run.outputs.should-run == 'true'
    runs-on: devextreme-shr2
    timeout-minutes: 15

    steps:
      - name: Get sources
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v5
        name: Setup pnpm cache
        with:
          path: |
            ${{ env.STORE_PATH }}
            .nx/cache
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build devextreme package
        env:
          BUILD_TEST_INTERNAL_PACKAGE: true
        working-directory: ./packages/devextreme
        run: pnpm exec nx build

  check-regenerate:
    needs: check-should-run
    if: needs.check-should-run.outputs.should-run == 'true'
    runs-on: devextreme-shr2
    timeout-minutes: 10

    steps:
      - name: Get sources
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v5
        name: Setup pnpm cache
        with:
          path: |
            ${{ env.STORE_PATH }}
            .nx/cache
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate wrappers
        run: pnpm run regenerate-all

      - name: Check generated code
        shell: bash
        run: |
          git add . -N
          changes=$(git diff --name-status HEAD -- packages/devextreme-angular/src packages/devextreme-react/src packages/devextreme-vue/src)
          if [ -n "$changes" ]; then
            echo "Generated code is outdated. The following files have uncommitted changes:"
            echo "$changes";
            echo "To update generated code, use "pnpm run regenerate-all" and commit changes."
            exit 1
          fi

  test:
    timeout-minutes: 20
    needs: [check-should-run, build]
    if: needs.check-should-run.outputs.should-run == 'true'
    runs-on: devextreme-shr2
    strategy:
      fail-fast: false
      matrix:
        framework: [angular, react, vue]

    steps:
      - name: Get sources
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v5
        name: Setup pnpm cache
        with:
          path: |
            ${{ env.STORE_PATH }}
            .nx/cache
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download Browser
        if: matrix.framework == 'angular'
        run: |
          PUPPETEER_CMD="browsers install chrome@130.0.6723.69"
          pnpm --filter devextreme-angular exec puppeteer $PUPPETEER_CMD

      - name: Test ${{ matrix.framework }}
        run: pnpm exec nx test devextreme-${{ matrix.framework }}

      - name: Pack ${{ matrix.framework }}
        run: pnpm exec nx pack devextreme-${{ matrix.framework }}
