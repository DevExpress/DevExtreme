name: Themebuilder and Styles tests

concurrency:
  group: wf-${{github.event.pull_request.number || github.sha}}-${{github.workflow}}
  cancel-in-progress: true

on:
  pull_request:
    paths-ignore:
      - 'apps/**/*.md'
  merge_group:

env:
  NX_SKIP_NX_CACHE: ${{ contains(github.event.pull_request.labels.*.name, 'skip-cache') && 'true' || 'false' }}

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=8192
    timeout-minutes: 30

    steps:
    - name: Get sources
      uses: actions/checkout@v6

    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: '.node-version'

    - uses: pnpm/action-setup@v6
      with:
        run_install: false

    - name: Get pnpm store directory
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

    - uses: actions/cache@v5
      name: Setup pnpm cache
      with:
        path: ${{ env.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-cache-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-cache

    - name: Lookup nx cache
      id: lookup-nx-cache
      uses: actions/cache/restore@v5
      with:
        path: |
          .nx/cache
          .nx/workspace-data/*.db
          .nx/workspace-data/*.db-wal
          .nx/workspace-data/*.db-shm
        key: ${{ runner.os }}-nx-v2-${{ github.sha }}-${{ github.workflow }}-${{ github.job }}-${{ github.run_attempt }}
        restore-keys: |
          ${{ runner.os }}-nx-v2-${{ github.sha }}-${{ github.workflow }}-${{ github.job }}-
          ${{ runner.os }}-nx-v2-${{ github.sha }}-
          ${{ runner.os }}-nx-v2-

        lookup-only: true

    - name: Show nx cache status
      shell: bash
      run: |
        echo "Nx cache lookup exact hit: ${{ steps.lookup-nx-cache.outputs.cache-hit }}"
        echo "Nx cache primary key: ${{ steps.lookup-nx-cache.outputs.cache-primary-key }}"
        echo "Nx cache matched key: ${{ steps.lookup-nx-cache.outputs.cache-matched-key }}"
        if [ -z "${{ steps.lookup-nx-cache.outputs.cache-matched-key }}" ]; then
          echo "Nx cache lookup: miss"
        elif [ "${{ steps.lookup-nx-cache.outputs.cache-hit }}" = "true" ]; then
          echo "Nx cache lookup: exact hit"
        else
          echo "Nx cache lookup: partial hit via restore-keys"
        fi

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Setup nx cache
      id: setup-nx-cache
      uses: actions/cache@v5
      with:
        path: |
          .nx/cache
          .nx/workspace-data/*.db
          .nx/workspace-data/*.db-wal
          .nx/workspace-data/*.db-shm
        key: ${{ runner.os }}-nx-v2-${{ github.sha }}-${{ github.workflow }}-${{ github.job }}-${{ github.run_attempt }}
        restore-keys: |
          ${{ runner.os }}-nx-v2-${{ github.sha }}-${{ github.workflow }}-${{ github.job }}-
          ${{ runner.os }}-nx-v2-${{ github.sha }}-
          ${{ runner.os }}-nx-v2-

    - name: Build etalon bundles
      working-directory: ./packages/devextreme-scss
      run: pnpm nx build:ci devextreme-scss

    - name: Build
      working-directory: ./packages/devextreme-themebuilder
      run: pnpm exec nx build

    - name: Run themebuilder tests (full set, node)
      working-directory: ./packages/devextreme-themebuilder
      run: pnpm exec nx test

    - name: Check styles for duplicate rules (generic)
      working-directory: ./packages/devextreme-scss
      run: pnpm exec stylelint --config tests/bundles-stylelint-config.json "../devextreme/artifacts/**/dx.light.css"

    - name: Check styles for duplicate rules (material)
      working-directory: ./packages/devextreme-scss
      run: pnpm exec stylelint --config tests/bundles-stylelint-config.json "../devextreme/artifacts/**/dx.material.blue.light.css"

  notify:
    runs-on: ubuntu-latest
    name: Send notifications
    needs: [test]
    if: github.event_name != 'pull_request' && contains(needs.*.result, 'failure')

    steps:
      - uses: actions/checkout@v6
      - uses: DevExpress/github-actions/send-teams-notification@v1
        with:
          hook_url: ${{secrets.TEAMS_ALERT}}
          bearer_token: ${{secrets.GITHUB_TOKEN}}
          specific_repo: DevExpress/DevExtreme
