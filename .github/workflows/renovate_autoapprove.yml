name: Auto approve renovate bot PR

on:
  pull_request_target

jobs:
  auto-approve:
    runs-on: devextreme-slim
    steps:
    - uses: hmarr/auto-approve-action@v4.0.0
      if: github.actor == 'renovate-bot' || github.actor == 'renovate[bot]'
      with:
        github-token: "${{ secrets.GITHUB_TOKEN }}"
