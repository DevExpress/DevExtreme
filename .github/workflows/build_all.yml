name: Build and pack DevExtreme npm packages

on:
  pull_request:
    paths-ignore:
      - 'apps/**/*.md'
  merge_group:
  workflow_dispatch:
    inputs:
      SBOM:
        description: 'Build SBOM'
        required: false
        default: false
        type: boolean

concurrency:
  group: wf-${{github.event.pull_request.number || github.ref || github.sha}}-${{github.workflow}}
  cancel-in-progress: true

env:
  NX_SKIP_NX_CACHE: ${{ contains(github.event.pull_request.labels.*.name, 'skip-cache') && 'true' || 'false' }}
  CYCLONEDX_CLI_VERSION: 0.32.0
  CYCLONEDX_CLI_LINUX_X64_SHA256: 454879e6a4a405c8a13bff49b8982adcb0596f3019b26b0811c66e4d7f0783e1

jobs:
  build:
    runs-on: devextreme-shr2

    steps:
      - name: Get sources
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v5
        name: Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-cache-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-cache

      - name: Lookup nx cache
        id: lookup-nx-cache
        uses: actions/cache/restore@v5
        with:
          path: |
            .nx/cache
            .nx/workspace-data/*.db
            .nx/workspace-data/*.db-wal
            .nx/workspace-data/*.db-shm
          key: ${{ runner.os }}-nx-v2-${{ github.workflow }}-${{ github.job }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-nx-v2-${{ github.workflow }}-${{ github.job }}-${{ github.sha }}-
            ${{ runner.os }}-nx-v2-${{ github.workflow }}-${{ github.job }}-
            ${{ runner.os }}-nx-v2-

          lookup-only: true

      - name: Show nx cache status
        shell: bash
        run: |
          echo "Nx cache lookup exact hit: ${{ steps.lookup-nx-cache.outputs.cache-hit }}"
          echo "Nx cache primary key: ${{ steps.lookup-nx-cache.outputs.cache-primary-key }}"
          echo "Nx cache matched key: ${{ steps.lookup-nx-cache.outputs.cache-matched-key }}"
          if [ -z "${{ steps.lookup-nx-cache.outputs.cache-matched-key }}" ]; then
            echo "Nx cache lookup: miss"
          elif [ "${{ steps.lookup-nx-cache.outputs.cache-hit }}" = "true" ]; then
            echo "Nx cache lookup: exact hit"
          else
            echo "Nx cache lookup: partial hit via restore-keys"
          fi

      - name: Install dependencies
        run:  pnpm install --frozen-lockfile

      - name: Setup nx cache
        id: setup-nx-cache
        uses: actions/cache@v5
        with:
          path: |
            .nx/cache
            .nx/workspace-data/*.db
            .nx/workspace-data/*.db-wal
            .nx/workspace-data/*.db-shm
          key: ${{ runner.os }}-nx-v2-${{ github.workflow }}-${{ github.job }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-nx-v2-${{ github.workflow }}-${{ github.job }}-${{ github.sha }}-
            ${{ runner.os }}-nx-v2-${{ github.workflow }}-${{ github.job }}-
            ${{ runner.os }}-nx-v2-

      - name: Build npm packages
        run: pnpm run all:build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: devextreme-npm-packages
          path: |
            artifacts/npm/*.tgz
          retention-days: 1

      - name: Build SBOMs
        if: ${{ github.event.inputs.SBOM == 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm set //npm.pkg.github.com/:_authToken="$NODE_AUTH_TOKEN";
          pnpm nx build sbom;

      - name: Install CycloneDX CLI
        if: ${{ github.event.inputs.SBOM == 'true' }}
        shell: bash
        run: |
          tool_dir="$RUNNER_TEMP/cyclonedx-cli"
          mkdir -p "$tool_dir"
          curl -fsSL "https://github.com/CycloneDX/cyclonedx-cli/releases/download/v${{ env.CYCLONEDX_CLI_VERSION }}/cyclonedx-linux-x64" -o "$tool_dir/cyclonedx"
          echo "${{ env.CYCLONEDX_CLI_LINUX_X64_SHA256 }}  $tool_dir/cyclonedx" | sha256sum -c -
          chmod +x "$tool_dir/cyclonedx"
          echo "$tool_dir" >> "$GITHUB_PATH"

      - name: Validate SBOMs
        if: ${{ github.event_name == 'push' || github.event.inputs.SBOM == 'true' }}
        shell: bash
        run: |
          shopt -s nullglob
          sbom_files=(packages/sbom/dist/*.sbom.json)

          if [ ${#sbom_files[@]} -eq 0 ]; then
            echo "No SBOM files found in packages/sbom/dist"
            exit 1
          fi

          for file in "${sbom_files[@]}"; do
            echo "Validating $file"
            cyclonedx validate --input-file "$file" --input-format json --fail-on-errors
          done

      - name: Upload SBOMs
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: |
            packages/sbom/dist/**/*
          retention-days: 1

  custom_bundles:
    runs-on: devextreme-shr2
    needs: build

    steps:
      - name: Get sources
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Download npm packages
        uses: actions/download-artifact@v8
        with:
          name: devextreme-npm-packages
          path: npm

      - name: Move devextreme package
        run: mv ./npm/devextreme-2*.tgz ./e2e/devextreme-bundler/devextreme.tgz

      - name: Setup deps
        working-directory: ./e2e/devextreme-bundler
        run: |
          pnpm install --filter devextreme-bundler-test --frozen-lockfile
          pnpm add --ignore-workspace --allow-build=core-js --allow-build=inferno ./devextreme.tgz

      - name: Build bundle
        working-directory: ./e2e/devextreme-bundler
        run: |
          ./node_modules/.bin/devextreme-bundler-init custom-bundle
          ./node_modules/.bin/devextreme-bundler custom-bundle
