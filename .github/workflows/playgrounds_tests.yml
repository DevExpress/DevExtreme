name: Playgrounds tests

concurrency:
  group: wf-${{github.event.pull_request.number || github.sha}}-${{github.workflow}}
  cancel-in-progress: true

on:
  pull_request:
    paths-ignore:
      - 'apps/**/*.md'
  merge_group:

env:
  NX_SKIP_NX_CACHE: ${{ contains(github.event.pull_request.labels.*.name, 'skip-cache') && 'true' || 'false' }}

jobs:
  build:
    name: build
    strategy:
      fail-fast: false

    runs-on: devextreme-shr2
    timeout-minutes: 15

    steps:
    - name: Get sources
      uses: actions/checkout@v6

    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: '.node-version'

    - uses: pnpm/action-setup@v6
      with:
        run_install: false

    - name: Get pnpm store directory
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

    - uses: actions/cache@v5
      name: Setup pnpm cache
      with:
        path: ${{ env.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-cache-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-cache

    - name: Lookup nx cache
      id: lookup-nx-cache
      uses: actions/cache/restore@v5
      with:
        path: |
          .nx/cache
          .nx/workspace-data/*.db
          .nx/workspace-data/*.db-wal
          .nx/workspace-data/*.db-shm
        key: ${{ runner.os }}-nx-v2-${{ github.sha }}-${{ github.workflow }}-${{ github.job }}-${{ github.run_attempt }}
        restore-keys: |
          ${{ runner.os }}-nx-v2-${{ github.sha }}-${{ github.workflow }}-${{ github.job }}-
          ${{ runner.os }}-nx-v2-${{ github.sha }}-
          ${{ runner.os }}-nx-v2-

        lookup-only: true

    - name: Show nx cache status
      shell: bash
      run: |
        echo "Nx cache lookup exact hit: ${{ steps.lookup-nx-cache.outputs.cache-hit }}"
        echo "Nx cache primary key: ${{ steps.lookup-nx-cache.outputs.cache-primary-key }}"
        echo "Nx cache matched key: ${{ steps.lookup-nx-cache.outputs.cache-matched-key }}"
        if [ -z "${{ steps.lookup-nx-cache.outputs.cache-matched-key }}" ]; then
          echo "Nx cache lookup: miss"
        elif [ "${{ steps.lookup-nx-cache.outputs.cache-hit }}" = "true" ]; then
          echo "Nx cache lookup: exact hit"
        else
          echo "Nx cache lookup: partial hit via restore-keys"
        fi

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Setup nx cache
      id: setup-nx-cache
      uses: actions/cache@v5
      with:
        path: |
          .nx/cache
          .nx/workspace-data/*.db
          .nx/workspace-data/*.db-wal
          .nx/workspace-data/*.db-shm
        key: ${{ runner.os }}-nx-v2-${{ github.sha }}-${{ github.workflow }}-${{ github.job }}-${{ github.run_attempt }}
        restore-keys: |
          ${{ runner.os }}-nx-v2-${{ github.sha }}-${{ github.workflow }}-${{ github.job }}-
          ${{ runner.os }}-nx-v2-${{ github.sha }}-
          ${{ runner.os }}-nx-v2-

    - name: Build
      working-directory: ./packages/devextreme
      run: pnpm exec nx build

    - name: Zip artifacts
      working-directory: ./packages/devextreme
      run: |
        7z a -tzip -mx3 -mmt2 artifacts.zip artifacts ../devextreme-scss/scss/bundles

    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: devextreme-artifacts
        path: ./packages/devextreme/artifacts.zip
        retention-days: 1

  test:
    name: ${{ matrix.ARGS.platform }}
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        ARGS: [
          { platform: "angular" },
          { platform: "react" },
          { platform: "vue" },
        ]
    runs-on: devextreme-shr2
    timeout-minutes: 60
    steps:
    - name: Get sources
      uses: actions/checkout@v6

    - name: Setup Chrome
      uses: ./.github/actions/setup-chrome
      with:
        chrome-version: '149.0.7827.114'

    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: '.node-version'

    - name: Download artifacts
      uses: actions/download-artifact@v8
      with:
        name: devextreme-artifacts
        path: ./packages/devextreme

    - name: Unpack artifacts
      working-directory: ./packages/devextreme
      run: 7z x artifacts.zip -aoa

    - uses: pnpm/action-setup@v6
      with:
        run_install: false

    - name: Get pnpm store directory
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

    - uses: actions/cache@v5
      name: Setup pnpm cache
      with:
        path: ${{ env.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-cache-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-cache

    - name: Lookup nx cache
      id: lookup-nx-cache
      uses: actions/cache/restore@v5
      with:
        path: |
          .nx/cache
          .nx/workspace-data/*.db
          .nx/workspace-data/*.db-wal
          .nx/workspace-data/*.db-shm
        key: ${{ runner.os }}-nx-v2-${{ github.sha }}-${{ github.workflow }}-${{ github.job }}-${{ matrix.ARGS.platform }}-${{ github.run_attempt }}
        restore-keys: |
          ${{ runner.os }}-nx-v2-${{ github.sha }}-${{ github.workflow }}-${{ github.job }}-${{ matrix.ARGS.platform }}-
          ${{ runner.os }}-nx-v2-${{ github.sha }}-${{ github.workflow }}-${{ github.job }}-
          ${{ runner.os }}-nx-v2-${{ github.sha }}-
          ${{ runner.os }}-nx-v2-

        lookup-only: true

    - name: Show nx cache status
      shell: bash
      run: |
        echo "Nx cache lookup exact hit: ${{ steps.lookup-nx-cache.outputs.cache-hit }}"
        echo "Nx cache primary key: ${{ steps.lookup-nx-cache.outputs.cache-primary-key }}"
        echo "Nx cache matched key: ${{ steps.lookup-nx-cache.outputs.cache-matched-key }}"
        if [ -z "${{ steps.lookup-nx-cache.outputs.cache-matched-key }}" ]; then
          echo "Nx cache lookup: miss"
        elif [ "${{ steps.lookup-nx-cache.outputs.cache-hit }}" = "true" ]; then
          echo "Nx cache lookup: exact hit"
        else
          echo "Nx cache lookup: partial hit via restore-keys"
        fi

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Setup nx cache
      id: setup-nx-cache
      uses: actions/cache@v5
      with:
        path: |
          .nx/cache
          .nx/workspace-data/*.db
          .nx/workspace-data/*.db-wal
          .nx/workspace-data/*.db-shm
        key: ${{ runner.os }}-nx-v2-${{ github.sha }}-${{ github.workflow }}-${{ github.job }}-${{ matrix.ARGS.platform }}-${{ github.run_attempt }}
        restore-keys: |
          ${{ runner.os }}-nx-v2-${{ github.sha }}-${{ github.workflow }}-${{ github.job }}-${{ matrix.ARGS.platform }}-
          ${{ runner.os }}-nx-v2-${{ github.sha }}-${{ github.workflow }}-${{ github.job }}-
          ${{ runner.os }}-nx-v2-${{ github.sha }}-
          ${{ runner.os }}-nx-v2-

    - name: Build
      working-directory: ./packages/devextreme-${{ matrix.ARGS.platform }}
      run: pnpm exec nx pack

    - name: Check sources compilation
      working-directory: ./apps/${{ matrix.ARGS.platform }}
      run: pnpm exec nx build --excludeTaskDependencies

