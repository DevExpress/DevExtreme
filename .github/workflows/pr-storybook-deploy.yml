name: PR Storybook - Deploy

on:
  workflow_run:
    workflows:
      - PR Storybook - Build
    types:
      - completed

permissions:
  contents: write
  actions: read

env:
  SOURCE_DIR: ./apps/react-storybook/storybook-static

jobs:
  prepare:
    name: Read build meta
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      action: ${{ steps.meta.outputs.action }}
      pr_number: ${{ steps.meta.outputs.pr_number }}

    steps:
      - name: Download meta artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          run-id: ${{ github.event.workflow_run.id }}
          name: preview-meta
          path: artifacts
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}

      - name: Read meta
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          META="artifacts/preview_meta/meta.json"
          echo "Meta:"
          cat "$META"

          PR_NUMBER="$(jq -r '.pr_number' "$META")"
          ACTION="$(jq -r '.action' "$META")"

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "action=$ACTION" >> "$GITHUB_OUTPUT"

  deploy:
    name: "Deploy/remove preview — PR #${{ needs.prepare.outputs.pr_number }}"
    needs: prepare
    if: needs.prepare.outputs.action != 'none'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: https://github.com/${{ github.repository }}/pull/${{ needs.prepare.outputs.pr_number }}

    concurrency:
      group: preview-deploy-${{ needs.prepare.outputs.pr_number }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download static artifact
        if: needs.prepare.outputs.action == 'deploy'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          run-id: ${{ github.event.workflow_run.id }}
          name: preview-static
          path: .
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}

      - name: Deploy/remove PR preview
        uses: rossjrw/pr-preview-action@ffa7509e91a3ec8dfc2e5536c4d5c1acdf7a6de9 # v1.8.1
        with:
          action: ${{ needs.prepare.outputs.action }}
          pr-number: ${{ needs.prepare.outputs.pr_number }}
          source-dir: ${{ env.SOURCE_DIR }}
          preview-branch: gh-pages
          umbrella-dir: preview
          comment: false
          token: ${{ github.token }}
          wait-for-pages-deployment: true
