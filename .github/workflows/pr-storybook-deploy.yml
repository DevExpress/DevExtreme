name: PR Storybook - Preview

on:
  pull_request:
    branches:
      - 26_1
    types:
      - opened
      - reopened
      - synchronize
      - labeled
      - unlabeled
      - closed

permissions:
  contents: write

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  SOURCE_DIR: ./apps/react-storybook/storybook-static

jobs:
  deploy:
    name: "Build & Deploy — PR #${{ github.event.pull_request.number }}"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      (
        contains(github.event.pull_request.labels.*.name, 'storybook') ||
        (github.event.action == 'unlabeled' && github.event.label.name == 'storybook')
      )

    steps:
      - name: Determine action
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          EVENT_ACTION="${{ github.event.action }}"
          CHANGED_LABEL="${{ github.event.label.name || '' }}"
          if [[ "$EVENT_ACTION" == "closed" ]] || [[ "$EVENT_ACTION" == "unlabeled" && "$CHANGED_LABEL" == "storybook" ]]; then
            echo "action=remove" >> "$GITHUB_OUTPUT"
          else
            echo "action=deploy" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 1

      - name: Use Node.js
        if: steps.meta.outputs.action == 'deploy'
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'

      - name: Setup pnpm
        if: steps.meta.outputs.action == 'deploy'
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Get pnpm store directory
        if: steps.meta.outputs.action == 'deploy'
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm + nx cache
        if: steps.meta.outputs.action == 'deploy'
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.STORE_PATH }}
            .nx/cache
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store

      - name: Install dependencies
        if: steps.meta.outputs.action == 'deploy'
        run: pnpm install --frozen-lockfile

      - name: Build Storybook preview (static)
        if: steps.meta.outputs.action == 'deploy'
        run: pnpm nx build devextreme-react-storybook

      - name: Deploy/remove PR preview
        uses: rossjrw/pr-preview-action@ffa7509e91a3ec8dfc2e5536c4d5c1acdf7a6de9 # v1.8.1
        with:
          action: ${{ steps.meta.outputs.action }}
          pr-number: ${{ github.event.pull_request.number }}
          source-dir: ${{ env.SOURCE_DIR }}
          preview-branch: gh-pages
          umbrella-dir: preview
          comment: false
          token: ${{ github.token }}
          wait-for-pages-deployment: true
