<svg width="200" height="100" viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg">
  <g>
    <path fill="#3B82F6" d="M5,0 Q6,3 10,5 Q6,7 5,10 Q4,7 0,5 Q4,3 5,0Z">
      <animateTransform 
        attributeName="transform" 
        type="scale" 
        values="0;1;0" 
        dur="2s" 
        repeatCount="indefinite" 
        additive="sum"/>
      <animate 
        attributeName="opacity" 
        values="0;1;0" 
        dur="2s" 
        repeatCount="indefinite"/>
    </path>
  </g>

  <g transform="translate(60,30)">
    <path fill="#93C5FD" d="M5,0 Q6,3 10,5 Q6,7 5,10 Q4,7 0,5 Q4,3 5,0Z">
      <animateTransform 
        attributeName="transform" 
        type="scale" 
        values="0;1.2;0" 
        dur="3s" 
        repeatCount="indefinite" 
        additive="sum"/>
      <animate 
        attributeName="opacity" 
        values="0;1;0" 
        dur="3s" 
        repeatCount="indefinite"/>
    </path>
  </g>

  <g transform="translate(120,60)">
    <path fill="#2563EB" d="M5,0 Q6,3 10,5 Q6,7 5,10 Q4,7 0,5 Q4,3 5,0Z">
      <animateTransform 
        attributeName="transform" 
        type="scale" 
        values="0;1;0" 
        dur="1.5s" 
        begin="0.5s" 
        repeatCount="indefinite" 
        additive="sum"/>
      <animate 
        attributeName="opacity" 
        values="0;1;0" 
        dur="1.5s" 
        begin="0.5s" 
        repeatCount="indefinite"/>
    </path>
  </g>
</svg>
