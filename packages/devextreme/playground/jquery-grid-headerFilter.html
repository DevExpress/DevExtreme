                        applyFilter: 'auto',

                    searchPanel: {

                        width: 240,
                        placeholder: 'Search...',

                        visible: true,
                    },
                    pager: {
                        visible: true,
                    },
                    paging: {
                        pageSize: 2,
                    },
                    columns: [{
                        dataField: 'OrderNumber',
                        caption: 'Invoice Number',
                        width: 140,
                        headerFilter: {
                            groupInterval: 10000,
                        },
                    }, {
                        dataField: 'OrderDate',
                        alignment: 'right',
                        dataType: 'date',
                        width: 120,
                        calculateFilterExpression(value, selectedFilterOperations, target) {
                            if (target === 'headerFilter' && value === 'weekends') {
                                return [[getOrderDay, '=', 0], 'or', [getOrderDay, '=', 6]];
                            }
                            return this.defaultCalculateFilterExpression(value, selectedFilterOperations, target);
                        },
                        headerFilter: {
                            dataSource(data) {
                                data.dataSource.postProcess = function (results) {
                                    results.push({
                                        text: 'Weekends',
                                        value: 'weekends',
                                    });
                                    return results;
                                };
                            },
                        },
                    }, {
                        dataField: 'DeliveryDate',
                        alignment: 'right',
                        dataType: 'datetime',
                        width: 180,
                        format: 'M/d/yyyy, HH:mm',
                    }, {
                        dataField: 'SaleAmount',
                        alignment: 'right',
                        format: 'currency',
                        editorOptions: {
                            format: 'currency',
                            showClearButton: true,
                            inputAttr: {
                                'aria-label': 'Filter cell',
                            },
                        },
                        // filterValues: [['SaleAmount', '<', 3000]],
                        headerFilter: {
                            dataSource: [{
                                text: 'Less than $3000',
                                value: ['SaleAmount', '<', 3000],
                            }, {

                                text: '$3000 - $5000',
                                value: [['SaleAmount', '>=', 3000], ['SaleAmount', '<', 5000]],

                        },
                    }, 'Employee', {
                        caption: 'City',
                        dataField: 'CustomerStoreCity',
                        headerFilter: {
                            search: {
                                enabled: true,
                            },
                        },
                    }],
                }).dxDataGrid('instance');

                const applyFilterTypes = [{
                    key: 'auto',
                    name: 'Immediately',
                }, {
                    key: 'onClick',
                    name: 'On Button Click',
                }];

                const applyFilterModeEditor = $('#useFilterApplyButton').dxSelectBox({
                    items: applyFilterTypes,
                    value: applyFilterTypes[0].key,
                    valueExpr: 'key',
                    inputAttr: { 'aria-label': 'Apply Filter' },
                    displayExpr: 'name',
                    onValueChanged(data) {
                        dataGrid.option('filterRow.applyFilter', data.value);
                    },
                }).dxSelectBox('instance');

                $('#filterRow').dxCheckBox({
                    text: 'Filter Row',
                    value: true,
                    onValueChanged(data) {
                        dataGrid.clearFilter();
                        dataGrid.option('filterRow.visible', data.value);
                        applyFilterModeEditor.option('disabled', !data.value);
                    },
                });

                $('#headerFilter').dxCheckBox({
                    text: 'Header Filter',
                    value: true,
                    onValueChanged(data) {
                        dataGrid.clearFilter();
                        dataGrid.option('headerFilter.visible', data.value);

                function getOrderDay(rowData) {
