                    "dxScheduler-switcherMonth": "Mes",

                    "dxScheduler-switcherTimelineWorkWeek": "Línea de tiempo Semana Laboral",
                    "dxScheduler-switcherTimelineMonth": "Línea de tiempo Mes",
                },
                ru: {
                    "dxScheduler-switcherDay": "Test",
                    "dxScheduler-switcherWeek": "Test",
                }
            };
            DevExpress.localization.loadMessages(dictionary);

            const locales = [
                { name: 'English', value: 'en' },
                { name: 'Русский', value: 'ru' },
                { name: 'Spanish', value: 'es' },
            ];
            const locale = getLocale();
            DevExpress.localization.locale(locale);

            const { formatMessage } = DevExpress.localization;

            const selectBoxOptions = {
                inputAttr: { id: 'selectInput' },
                dataSource: locales,
                displayExpr: 'name',
                valueExpr: 'value',
                value: locale,
                onValueChanged: changeLocale,
            };

            function changeLocale(data) {
                setLocale(data.value);
                window.location.href = window.location.href;
            }

            function getLocale() {
                const storageLocale = sessionStorage.getItem('locale');
                return storageLocale != null ? storageLocale : 'en';
            }

            function setLocale(savingLocale) {
                sessionStorage.setItem('locale', savingLocale);
            }


            $('#scheduler').dxScheduler({
                timeZone: 'America/Los_Angeles',
                dataSource: data,
                views: ['day', 'week', 'workWeek', 'month','timelineDay', 'timelineWeek', 'timelineWorkWeek', 'timelineMonth'],
                currentView: 'day',
                currentDate: new Date(2021, 3, 29),
                startDayHour: 9,
                height: 730,
            });
            $('#selectBox').dxSelectBox(selectBoxOptions);
        });
