                // $('#show-popup-button').dxButton({

                function rebindItems() {
                    const popup = $('#popup').dxPopup("instance");
                    const items = popup.option("toolbarItems");

                    items[items.length - 2].visible = false;

                    popup.option("toolbarItems", [...items]);
                }

                function getItemConfig(caption, locateInMenu = 'none') {
                    return {
                        text: caption,
                        toolbar: 'top',
                        location: 'after',
                        locateInMenu,
                    }
                }

                function getBottomItemConfig(caption, locateInMenu = 'none') {
                    return {
                        text: caption,
                        toolbar: 'bottom',
                        location: 'after',
                        locateInMenu,
                    }
                }

                function getCenterItemConfig(caption) {
                    return {
                        text: caption,
                        toolbar: 'top',
                        location: 'center',
                        locateInMenu: 'none',
                    }
                }

                /**
                 * There are 4 items in the toolbar in total:
                 * 1. Title - Title to be trimmed with a multi-point.
                 * 2. The usual aitem that should go into the overflow menu because the header is long. | Check case when the header is not long.
                 * 3. A regular atem that will be hidden after rebind. It should go into the overflow menu.
                 * 4. An ordinary item. It should be included in the overflow menu.
                 *
                 * Note: the center item is completely hidden, it has no minimum width.
                 */
                const popup = $('#popup').dxPopup({
                    contentTemplate: function (element) {
                        const btnDiv = $("<div>");

                        btnDiv.dxButton({
                            text: "Rebind popup toolbar items",
                            onClick: rebindItems,
                        })

                        element.append(btnDiv);
                    },
                    visible: true,
                    width: 360,
                    height: 320,
                    title: '!@#$%^&*()-+=[]{}<>|:;.,!?~^*_(){}<>[]:-=+',
                    showCloseButton: false,
                    toolbarItems: [
                        // getCenterItemConfig("Center Item"),
                        getItemConfig("First Item"),
                        getItemConfig("Second Item", "auto"),
                        getItemConfig("Third Item", "auto"),
                        // {
                        //     toolbar: 'bottom',
                        //     location: "before",
                        //     text: "!@#$%^&*()-+=[]{}<>|:;.,!?~^*_(){}<>[]:-=+",
                        // },
                        // getBottomItemConfig("First Item"),
                        // getBottomItemConfig("Second Item", "auto"),
                        // getBottomItemConfig("Third Item", "auto"),
                    ],
                }).dxPopup('instance');
