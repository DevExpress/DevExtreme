<body class="dx-surface">
    <div role="main">
        <h1 style="position: fixed; left: 0; top: 0; clip: rect(1px, 1px, 1px, 1px);">Test header</h1>

        <select id="theme-selector" style="display: block;">
        </select>
        <br />
        <div id="button"></div>
        <script>
            $(() => {
                const princ = `
                    The Sun: structure, evolution and influence on the Earth

                    Introduction

                    The Sun is the central star of our planetary system, providing heat and light for life on Earth. It is a giant plasma ball composed mainly of hydrogen and helium. The Sun is a typical main-sequence star of spectral class G2V. Despite its apparent constancy, the Sun is a dynamic system with active physical processes such as thermonuclear reactions, magnetic storms, and solar wind.

                    Physical characteristics

                    The Sun has a mass of about 1.989 × 10³⁰ kg, which is 99.86% of the mass of the entire solar system. It has a radius of 696,340 km and an average density of 1.41 g/cm³. The temperature in the core reaches 15 million degrees Celsius, while on the surface it is about 5778 K.

                    The solar luminosity is 3.828 × 10²⁶ W, which is due to the thermonuclear fusion occurring in its core. The main process is the conversion of hydrogen to helium through the proton-proton cycle, accompanied by the release of enormous amounts of energy in the form of electromagnetic radiation.

                    Structure of the Sun

                    The Sun has a complex internal structure consisting of several layers:

                    The core - the central part where thermonuclear reactions take place.

                    Radiation zone - the area where energy is transferred by photons traveling through matter over thousands of years.

                    Convection zone - the outer layer where energy is transported by convective flows of hot gas.

                    Photosphere - the visible surface of the Sun, the source of radiation.

                    Chromosphere - thin layer of the atmosphere, which has a reddish glow.

                    Corona - the outer part of the atmosphere, extending for millions of kilometers and having a temperature of several million degrees.

                    Magnetic field and solar activity

                    Solar activity is expressed in the appearance of sunspots, flares, and coronal mass ejections. These phenomena are related to the dynamics of the magnetic field, which is generated by the movement of charged particles in the convection zone.

                    Sunspots are areas of reduced temperature caused by intense magnetic fields that prevent convection. Solar flares are powerful releases of energy associated with ruptures and rearrangements of magnetic lines of force.

                    Solar wind and its effect on the Earth

                    The solar wind is a stream of charged particles ejected by the Sun into interplanetary space. This flow interacts with the Earth's magnetosphere, causing auroras and geomagnetic storms.

                    During periods of high solar activity, geomagnetic storms can disrupt satellites, radio communications and power grids. In addition, coronal mass ejections can threaten astronauts in orbit and affect navigation and communication systems.

                    Evolution of the Sun

                    The Sun has been in the main sequence stage for about 4.6 billion years. In about 5 billion years, it will exhaust the supply of hydrogen in its core and begin to expand, becoming a red giant. At this stage, the outer layers will be shed and the core will shrink into a white dwarf, which will gradually cool down and become a black dwarf.

                    The Sun's influence on Earth's climate

                    Solar activity has an impact on our planet's climate. Long-term changes in solar activity can lead to climate anomalies, such as the Little Ice Age in the 17th century, when there was a decrease in sunspots.

                    Conclusion

                    The Sun plays a key role in the existence of life on Earth. Studies of this star help not only to understand its behavior, but also to predict geomagnetic disturbances that can affect technological systems. Future studies of the Sun and its environmental impact remain an important challenge for astrophysicists and geophysicists.
                `;

                const deployment = 'gpt-4o-mini';
                const apiVersion = '2024-02-01';
                const endpoint = 'https://public-api.devexpress.com/demo-openai';
                const apiKey = 'DEMO';

                const aIService = new AzureOpenAI({
                    dangerouslyAllowBrowser: true,
                    deployment,
                    endpoint,
                    apiVersion,
                    apiKey,
                });

                const generateAIServiceResponse = (prompt) => {
                    const { system, user } = prompt;

                    const params = {
                        messages: [
                            { role: 'system', content: system },
                            { role: 'user', content: user },
                        ],
                        model: deployment,
                        max_tokens: 1000,
                        temperature: 0.7,
                    };

                    const aIResponsePromise = aIService.chat.completions.create(params);

                    return aIResponsePromise;
                };

                const aIIntegration = {
                    getModelResponse: (prompt, type) => {
                        return new Promise((resolve, reject) => {
                            generateAIServiceResponse(prompt)
                                .then((result) => {
                                    const data = { choices: result.choices };
                                    const response = data.choices[0].message.content;

                                    resolve(response);
                                })
                                .catch((error) => {
                                    reject(error);
                                });
                        });
                    },
                };

                const editor = $('#button').dxHtmlEditor({
                    height: 400,
                    value: princ,
                    toolbar: {
                        items: [
                            { 
                                name: 'aIShortenText',
                                options: { icon: 'user', type: 'danger' },
                            },
                        ],
                    },
                    aIIntegration,
                }).dxHtmlEditor('instance');
            });
        </script>
    </div>
</body>
