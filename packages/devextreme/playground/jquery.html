<body class="dx-surface">
    <div role="main">
        <h1 style="position: fixed; left: 0; top: 0; clip: rect(1px, 1px, 1px, 1px);">Test header</h1>

        <select id="theme-selector" style="display: block;">
        </select>
        <br />
        <div id="scheduler"></div>
        <script>
            $(() => {
                $('#scheduler').dxScheduler({
                    dataSource: [
                        {
                            startDate: '2023-09-05T00:00:00',
                            endDate: '2023-09-05T03:00:00',
                            text: '#0 Usual 05 00:00->03:00',
                        },
                        {
                            startDate: '2023-09-05T04:00:00',
                            endDate: '2023-09-05T09:00:00',
                            text: '#1 Usual 05 05:00->09:00',
                        },
                        {
                            startDate: '2023-09-05T10:30:00',
                            endDate: '2023-09-05T16:30:00',
                            text: '#2 Usual 05 12:30->16:30',
                        },
                        {
                            startDate: '2023-09-05T17:00:00',
                            endDate: '2023-09-05T23:30:00',
                            text: '#3 Usual 05 18:00->22:00',
                        },
                        {
                            startDate: '2023-09-05T00:00:00',
                            endDate: '2023-09-05T00:00:00',
                            text: '#4 All-day 05',
                            allDay: true,
                        },
                    ],
                    views: [{ type: 'week', cellDuration: 60 }],
                    currentView: 'week',
                    currentDate: new Date(2023, 8, 7),
                    height: 800,
                    maxAppointmentsPerCell: 'unlimited',
                    offset: -735,
                    startDayHour: 9,
                    endDayHour: 17,
                    scrolling: {
                        mode: 'virtual',
                    },
                }).dxScheduler('instance');
            });

        </script>
    </div>
