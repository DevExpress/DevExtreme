    <script type="module">
        import { AzureOpenAI } from "https://esm.sh/openai@4.73.1";

        window.AzureOpenAI = AzureOpenAI;
    </script>
    <script type="text/javascript" src="../artifacts/js/dx.all.debug.js" charset="utf-8"></script>

<body class="dx-surface">
    <div role="main">
        <h1 style="position: fixed; left: 0; top: 0; clip: rect(1px, 1px, 1px, 1px);">Test header</h1>

        <select id="theme-selector" style="display: block;">
        </select>
        <br />
        <div id="chat"></div>
        <script>
            $(() => {
                const deployment = 'gpt-4o-mini';
                const apiVersion = '2024-02-01';
                const endpoint = 'https://public-api.devexpress.com/demo-openai';
                const apiKey = 'DEMO';
                
                const store = [];
                const conversationMessages = [];

                const user = {
                    id: 'user',
                    name: 'User',
                };

                const assistant = {
                    id: 'assistant',
                    name: 'AI Assistant',
                };

                DevExpress.localization.loadMessages({
                    en: {
                        'dxChat-emptyListMessage': 'Here Chat uses fake data. Ask about weather',
                        'dxChat-emptyListPrompt': 'Chat is empty',
                        'dxChat-textareaPlaceholder': 'Ask about weather...',
                    },
                });

                const chatService = new AzureOpenAI({
                    dangerouslyAllowBrowser: true,
                    deployment,
                    endpoint,
                    apiVersion,
                    apiKey,
                });

                function getWeather(location) {
                    const cityKey = location.toLowerCase();
                    const data = { temperature: 20, conditions: 'clear', humidity: 50 };
                    
                    return {
                        location,
                        temperature: `${data.temperature}°C`,
                        conditions: data.conditions,
                        humidity: `${data.humidity}%`,
                    };
                }

                const weatherTool = {
                    type: 'function',
                    function: {
                        name: 'get_weather',
                        description: 'Get the current weather in a given location',
                        parameters: {
                            type: 'object',
                            properties: {
                                location: {
                                    type: 'string',
                                    description: 'The city name, e.g. London, New York',
                                },
                            },
                            required: ['location'],
                            additionalProperties: false,
                        },
                    },
                    strict: true,
                };

                async function getAIResponse(messages, tools) {
                    const params = {
                        messages,
                        model: deployment,
                        max_tokens: 1000,
                        temperature: 0.7,
                        tools,
                    };

                    const response = await chatService.chat.completions.create(params);
                    return response.choices[0];
                }

                async function processMessageSending(message) {
                    conversationMessages.push({ role: 'user', content: message.text });
                    chatInstance.option({ typingUsers: [assistant] });

                    try {
                        const tools = [weatherTool];
                        const choice = await getAIResponse(conversationMessages, tools);

                        chatInstance.option({ typingUsers: [] });

                        if (choice.message.tool_calls && choice.message.tool_calls.length > 0) {
                            const toolCall = choice.message.tool_calls[0];
                            const functionName = toolCall.function.name;
                            const functionArgs = JSON.parse(toolCall.function.arguments);

                            conversationMessages.push(choice.message);

                            const functionResult = getWeather(functionArgs.location);

                            conversationMessages.push({
                                role: 'tool',
                                content: JSON.stringify(functionResult),
                                tool_call_id: toolCall.id,
                            });

                            chatInstance.option({ typingUsers: [assistant] });

                            const finalChoice = await getAIResponse(conversationMessages, tools);

                            chatInstance.option({ typingUsers: [] });

                            const aiText = finalChoice.message?.content;

                            conversationMessages.push(finalChoice.message);

                            renderAssistantMessage(aiText, {
                                functionCall: {
                                    name: functionName,
                                    arguments: Object.entries(functionArgs).map(([key, value]) => ({ [key]: value })),
                                    result: functionResult,
                                },
                            });
                        } else {
                            const aiText = choice.message?.content;

                            conversationMessages.push(choice.message);
                            renderAssistantMessage(aiText);
                        }
                    } catch (error) {
                        chatInstance.option({ typingUsers: [] });
                        conversationMessages.pop();
                        
                        chatInstance.option({
                            alerts: [{
                                message: 'Request failed. Please try again.',
                            }],
                        });

                        setTimeout(() => {
                            chatInstance.option({ alerts: [] });
                        }, 2000);
                    }
                }

                function renderAssistantMessage(text, metadata) {
                    const message = {
                        id: Date.now(),
                        timestamp: new Date(),
                        author: assistant,
                        text,
                        metadata,
                    };

                    dataSource.store().push([{ type: 'insert', data: message }]);
                }

                const customStore = new DevExpress.data.CustomStore({
                    key: 'id',
                    load: () => {
                        const d = $.Deferred();
                        setTimeout(() => {
                            d.resolve([...store]);
                        });
                        return d.promise();
                    },
                    insert: (message) => {
                        const d = $.Deferred();
                        setTimeout(() => {
                            store.push(message);
                            d.resolve();
                        });
                        return d.promise();
                    },
                });

                const dataSource = new DevExpress.data.DataSource({
                    store: customStore,
                    paginate: false,
                });

                const chatInstance = $("#chat").dxChat({
                    user,
                    width: 500,
                    height: 600,
                    dataSource: dataSource,
                    reloadOnChange: false,
                    showDayHeaders: false,
                    showAvatar: true,
                    showUserName: true,
                    showMessageTimestamp: true,
                    onMessageEntered: (e) => {
                        const { message } = e;

                        dataSource.store().push([{ 
                            type: 'insert', 
                            data: { 
                                id: Date.now(), 
                                ...message 
                            } 
                        }]);

                        processMessageSending(message);
                    }
                }).dxChat('instance');
            });
        </script>
    </div>
</body>
</html>
