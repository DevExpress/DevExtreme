<body class="dx-surface">
    <div role="main">
        <h1 style="position: fixed; left: 0; top: 0; clip: rect(1px, 1px, 1px, 1px);">Test header</h1>

        <select id="theme-selector" style="display: block;">
        </select>
        <br />

        <div class="dx-viewport demo-container">
            <div id="data-grid-demo">
                <div id="gridContainer"></div>
                <div class="options">
                    <div class="caption">Options</div>
                    <div class="option">
                        <label for="selectInput">Language</label>
                        <div id="selectBox"></div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            $(() => {
                const dictionary = {
                    en: {
                        Number: 'Number',
                        Contact: 'Contact',
                        Company: 'Company',
                        Amount: 'Amount',
                        PaymentDate: 'Payment Date',
                    },
                    de: {
                        Number: 'Nummer',
                        Contact: 'Ansprechpartner',
                        Company: 'Firma',
                        Amount: 'Betrag',
                        PaymentDate: 'Zahlungsdatum',
                        "dxDataGrid-columnChooserTitle": "Spaltenauswahl"
                    },
                    ru: {
                        Number: 'Номер',
                        Contact: 'Имя',
                        Company: 'Организация',
                        Amount: 'Сумма',
                        PaymentDate: 'Дата оплаты',
                    },
                };
                DevExpress.localization.loadMessages(dictionary);

                const locales = [
                    { name: 'English', value: 'en' },
                    { name: 'Deutsch', value: 'de' },
                    { name: 'Русский', value: 'ru' },
                ];
                const locale = getLocale();
                DevExpress.localization.locale(locale);

                const { formatMessage } = DevExpress.localization;

                const dataGridOptions = {
                    columnChooser: {
                        height: "340px",
                        enabled: true,
                        mode: "select",
                        position: {
                            my: 'right top',
                            at: 'right bottom',
                            of: '.dx-datagrid-column-chooser-button',
                        },
                        search: {
                            enabled: true,
                            editorOptions: { placeholder: 'Search column' },
                        },
                        selection: {
                            recursive: true,
                            selectByClick: true,
                            allowSelectAll: true,
                        },
                    },
                    dataSource: payments,
                    columns: [{
                        dataField: 'PaymentId',
                        caption: formatMessage('Number'),
                        allowEditing: false,
                        width: '100px',
                    }, {
                        dataField: 'ContactName',
                        caption: formatMessage('Contact'),
                    }, {
                        dataField: 'CompanyName',
                        caption: formatMessage('Company'),
                    }, {
                        dataField: 'Amount',
                        caption: formatMessage('Amount'),
                        dataType: 'number',
                        format: 'currency',
                        editorOptions: {
                            format: 'currency',
                            showClearButton: true,
                            inputAttr: {
                                'aria-label': 'Filter cell'
                            }
                        },
                    }, {
                        dataField: 'PaymentDate',
                        caption: formatMessage('PaymentDate'),
                        dataType: 'date',
                    }],
                    filterRow: {
                        visible: true,
                        applyFilter: 'auto',
                    },
                    editing: {
                        mode: 'popup',
                        allowUpdating: true,
                        popup: {
                            width: 700,
                            height: 345,
                        },
                    },
                };

                const selectBoxOptions = {
                    inputAttr: { id: 'selectInput' },
                    dataSource: locales,
                    displayExpr: 'name',
                    valueExpr: 'value',
                    value: locale,
                    onValueChanged: changeLocale,
                };

                function changeLocale(data) {
                    setLocale(data.value);
                    window.location.href = window.location.href;
                }

                function getLocale() {
                    const storageLocale = sessionStorage.getItem('locale');
                    return storageLocale != null ? storageLocale : 'en';
                }

                function setLocale(savingLocale) {
                    sessionStorage.setItem('locale', savingLocale);
                }

                $('#gridContainer').dxDataGrid(dataGridOptions);
                $('#selectBox').dxSelectBox(selectBoxOptions);
            });


            const payments = [{
                PaymentId: 1,
                ContactName: 'Nancy Davolio',
                CompanyName: 'Premier Buy',
                Amount: 1740,
                PaymentDate: '2013/01/06',

            {

            {

            {

            },
            {
                PaymentId: 5,

                CompanyName: 'Braeburn',
                Amount: 880,
                PaymentDate: '2013/01/10',
            },
            {

                ContactName: 'Michael Suyama',
                CompanyName: 'PriceCo',

            {

                Amount: 2790,

        </script>
