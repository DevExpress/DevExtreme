<body class="dx-surface">
    <div role="main">
        <h1 style="position: fixed; left: 0; top: 0; clip: rect(1px, 1px, 1px, 1px);">Test header</h1>

        <select id="theme-selector" style="display: block;">
        </select>
        <br />
        <div id="scheduler"></div>
        <script>
            $(() => {
                const date = new Date();
                const start = new Date(date);
                start.setHours(9, 0, 0);
                const end = new Date(date);
                end.setHours(9, 30, 0);
                $("#scheduler").dxScheduler({
                    // onAppointmentDeleting(e) {
                    //     e.cancel = DevExpress.ui.dialog.confirm(
                    //         'Вы точно хотите удалить встречу?',
                    //         'Подтверждение удаления'
                    //     ).then((confirmed) => !confirmed);
                    // },
                    dataSource: [
                        { text: 'Meeting 1', startDate: start, endDate: end },
                        { text: 'Meeting 2', startDate: start, endDate: end },
                        { text: 'Meeting 3', startDate: start, endDate: end },
                        { text: 'Meeting 4', startDate: start, endDate: end },
                        // { text: 'Meeting 5', startDate: start, endDate: end },
                        // { text: 'Meeting 6', startDate: start, endDate: end },
                        // { text: 'Meeting 7', startDate: start, endDate: end },
                        // { text: 'Meeting 8', startDate: start, endDate: end },
                        // { text: 'Meeting 9', startDate: start, endDate: end },
                        // { text: 'Meeting 10', startDate: start, endDate: end },
                    ],
                    views: ['day', 'week', 'month'],
                    currentView: 'day',
                    currentDate: date,
                    startDayHour: 9,
                    endDayHour: 18,
                    height: 1000,
                    maxAppointmentsPerCell: 1
                });
            });
        </script>
    </div>
