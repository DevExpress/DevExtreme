        <div id="selectedNodeKeys"></div>

        <div id="treeview"></div>

            $(() => {
                const treeview = $("#treeview")
                    .dxTreeView({
                    items: products,
                    selectionMode: "multiple",
                    selectByClick: true,
                    showCheckBoxesMode: "selectAll",
                    selectNodesRecursive: true,
                    allowShowCheckbox: ({component, item}) => {
                        if(item.id === '1_1_1_1') {
                            return false;
                        }
                        return true;
                    },
                    })
                    .dxTreeView("instance");
                
                $("#button_print").dxButton({
                    text: "Print selected node keys",
                    onClick(e) {
                    $("#selectedNodeKeys").empty();
                    treeview.getSelectedNodeKeys().forEach((key) => {
                        $("#selectedNodeKeys").append(`<div>${key}</div>`);
                    });
                    }
                });
            });
