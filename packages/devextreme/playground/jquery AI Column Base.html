<body class="dx-surface">
  <div role="main">
    <h1 style="position: fixed; left: 0; top: 0; clip: rect(1px, 1px, 1px, 1px);">Test header</h1>
    <select id="theme-selector" style="display: block;"></select>
    <br />
    <div id="grid"></div>
    <script>
      $(() => {
        let counter = 0;
        
    const rootAiIntegration = new DevExpress.aiIntegration({
      sendRequest() {
        const promise = new Promise((resolve) => {
          counter = 1;
          resolve('1');
        });

        const result = {
          promise,
          abort: () => {},
        };

        return result;
      },
    });
    const columnAiIntegration = new DevExpress.aiIntegration({
      sendRequest() {
        const promise = new Promise((resolve) => {
          counter = 2;
          resolve('2');
        });

        const result = {
          promise,
          abort: () => {},
        };

        return result;
      },
    });
        const dataSource = Array.from({ length: 100 }, (_, i) => ({ id: i + 1, name: `Item ${i + 1}` }));
        
        // Initialize DevExtreme DataGrid
        $("#grid").dxDataGrid({
          dataSource,
          showBorders: true,
          width: 500,
          filterRow: { visible: true },
          keyExpr: 'id',
          paging: {
            pageSize: 5,
          },
          pager: {
            visible: true,
          },
          headerFilter: {
            visible: true,
          },
          columns: [
            {
              dataField: 'id',
              // width: 80,
            },
            {
              dataField: 'name',
              caption: 'Name',
              sortOrder: 'asc',
              sortIndex: 3,
            },
            // {
            //   caption: 'AI2',
            //   type: 'ai',
            //   width: 100,
            //   name: 'AItest',

            //   allowFiltering: true,
            //   allowSorting: true,
            //   sortOrder: 'asc',
            //   sortIndex: 2,
            //   calculateSortValue: 'name',
            // },
            {
              caption: 'Custom',
              type: 'ai',
              // width: 100,
              name: 'CustomTest',

              allowFiltering: true,
              ai: {
                aiIntegration: columnAiIntegration,
              },
              // cssClass: 'custom-class',
              // allowSorting: true,
              // sortOrder: 'asc',
              // sortIndex: 1,

              // dataField: 'name',
            },
          ],
        });
      });
    </script>
  </div>
</body>
