<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>QUnit Test Runner - DevExtreme Tests</title>
  <link rel="stylesheet" href="https://code.jquery.com/qunit/qunit-2.24.1.css">
  <link rel="stylesheet" href="/testing/test-environment/styles/main-page.css">
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>DevExtreme Test Runner</h1>
    </div>

    <div class="stats">
      📊 <strong>Total tests:</strong> {{TOTAL_TESTS}} |
      📂 <strong>Categories:</strong> {{TOTAL_FOLDERS}} |
      <span id="runningTestsIndicator" style="display: none;">
        ⏱️ <strong>Running:</strong> <span id="runningTestsCount">0</span>
      </span>
    </div>

    <div class="global-stats">
      <div class="global-stat passed clickable" onclick="runTestsByStatus('passed')" title="Click to run all passed tests">
        <span class="stat-icon">✅</span>
        <div class="stat-info">
          <span class="stat-label">Passed</span>
          <span class="stat-count" id="globalPassedCount">0</span>
        </div>
        <div class="stat-action">▶️</div>
      </div>
      <div class="global-stat failed clickable" onclick="runTestsByStatus('failed')" title="Click to run all failed tests">
        <span class="stat-icon">❌</span>
        <div class="stat-info">
          <span class="stat-label">Failed</span>
          <span class="stat-count" id="globalFailedCount">0</span>
        </div>
        <div class="stat-action">▶️</div>
      </div>
      <div class="global-stat broken clickable" onclick="runTestsByStatus('broken')" title="Click to run all broken tests">
        <span class="stat-icon">💥</span>
        <div class="stat-info">
          <span class="stat-label">Broken</span>
          <span class="stat-count" id="globalBrokenCount">0</span>
        </div>
        <div class="stat-action">▶️</div>
      </div>
      <div class="global-stat pending clickable" onclick="runTestsByStatus('pending')" title="Click to run all pending tests">
        <span class="stat-icon">⏳</span>
        <div class="stat-info">
          <span class="stat-label">Pending</span>
          <span class="stat-count" id="globalPendingCount">{{TOTAL_TESTS}}</span>
        </div>
        <div class="stat-action">▶️</div>
      </div>
    </div>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="🔍 Search tests..." oninput="filterTests()">
    </div>

    <div class="controls">
      <button class="control-button" onclick="expandAll()">📂 Expand all</button>
      <button class="control-button" onclick="collapseAll()">📁 Collapse all</button>
      <button class="control-button" onclick="runAllTests()">▶️ Run all tests</button>
      <button class="clear-results-btn" onclick="clearAllTestResults()">🗑️ Clear results</button>
    </div>

    <div class="folders-container" id="foldersContainer">
      {{FOLDER_LIST}}
    </div>
  </div>

  <script src="/testing/test-environment/scripts/main-page.js"></script>
</body>

</html>
